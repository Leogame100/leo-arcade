<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>微信群权力战争</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;}
  :root{--wx:#07c160;--wx-d:#06a552;--bg:#ededed;--bubble:#fff;--me:#95ec69;--ink:#1a1a1a;--muted:#8a8a8a;
    --danger:#fa5151;--gold:#ffbe3d;--blue:#10aeff;}
  html,body{height:100%;background:#000;overflow:hidden;}
  #app{height:100%;display:flex;align-items:center;justify-content:center;}
  #phone{position:relative;width:100%;max-width:440px;height:100%;max-height:900px;background:var(--bg);
    display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.6);}
  /* 顶部导航 */
  .nav{flex:0 0 auto;background:#ededed;border-bottom:1px solid #d6d6d6;padding:10px 12px 8px;
    display:flex;align-items:center;gap:8px;}
  .nav .back{font-size:20px;color:#333;width:24px;}
  .nav .gname{flex:1;text-align:center;font-size:16px;font-weight:600;color:#000;}
  .nav .gname small{color:var(--muted);font-weight:400;}
  .nav .more{font-size:20px;color:#333;width:24px;text-align:right;}
  /* 状态条 */
  .status{flex:0 0 auto;background:#fff;border-bottom:1px solid #e3e3e3;padding:7px 12px;
    display:flex;flex-wrap:wrap;gap:6px 12px;align-items:center;font-size:12px;}
  .status .role{background:linear-gradient(135deg,#ffd34d,#ff9d2e);color:#5a3b00;font-weight:800;
    padding:2px 9px;border-radius:20px;font-size:12px;}
  .status .chip{color:#444;font-weight:600;} .status .chip b{color:#000;}
  .barwrap{flex:1 1 100%;display:flex;align-items:center;gap:8px;margin-top:2px;}
  .barwrap .lab{font-size:11px;color:var(--muted);white-space:nowrap;}
  .bar{flex:1;height:12px;background:#eee;border-radius:8px;overflow:hidden;position:relative;box-shadow:inset 0 1px 2px rgba(0,0,0,.12);}
  .bar > i{display:block;height:100%;border-radius:8px;transition:width .4s ease, background .3s;}
  .bar .txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#333;}
  /* 聊天区 */
  #chat{flex:1;overflow-y:auto;padding:12px 12px 6px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;}
  .sys{align-self:center;background:rgba(0,0,0,.10);color:#fff;background:#c8c8c8;color:#fff;
    font-size:11px;padding:3px 10px;border-radius:6px;max-width:85%;text-align:center;line-height:1.5;}
  .sys.event{background:#7d6bb0;} .sys.good{background:#54b26a;} .sys.bad{background:#e2645c;}
  .msg{display:flex;gap:8px;max-width:82%;animation:pop .2s ease;}
  .msg .av{flex:0 0 auto;width:38px;height:38px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;background:#d8d8d8;}
  .msg .body{display:flex;flex-direction:column;gap:2px;}
  .msg .who{font-size:11px;color:var(--muted);margin-left:2px;}
  .msg .bub{background:var(--bubble);padding:8px 11px;border-radius:5px;font-size:14px;line-height:1.45;color:#1a1a1a;
    position:relative;box-shadow:0 1px 1px rgba(0,0,0,.04);word-break:break-word;}
  .msg .bub::before{content:"";position:absolute;left:-5px;top:12px;border:6px solid transparent;border-right-color:var(--bubble);border-left:0;}
  .msg.me{align-self:flex-end;flex-direction:row-reverse;}
  .msg.me .bub{background:var(--me);}
  .msg.me .bub::before{left:auto;right:-5px;border-right-color:transparent;border-left-color:var(--me);border-right:0;}
  @keyframes pop{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  /* 底部操作 */
  .dock{flex:0 0 auto;background:#f7f7f7;border-top:1px solid #dcdcdc;padding:8px;}
  .hintline{font-size:11px;color:var(--muted);text-align:center;margin-bottom:6px;min-height:14px;}
  .acts{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
  .act{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:8px 4px;cursor:pointer;text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:2px;transition:transform .05s,background .1s;}
  .act:active{transform:scale(.95);} .act.dis{opacity:.4;pointer-events:none;}
  .act .ico{font-size:20px;} .act .nm{font-size:11px;font-weight:600;color:#333;} .act .cost{font-size:9px;color:var(--gold);font-weight:700;}
  .act.primary{background:var(--wx);border-color:var(--wx);} .act.primary .nm,.act.primary .ico{color:#fff;}
  /* 覆盖层 */
  .overlay{position:absolute;inset:0;background:rgba(20,20,25,.72);display:flex;align-items:center;justify-content:center;
    z-index:20;padding:18px;}
  .overlay.hidden{display:none;}
  .sheet{background:#f6f6f6;border-radius:16px;width:100%;max-width:380px;max-height:88%;overflow-y:auto;padding:16px;}
  .sheet h2{font-size:18px;text-align:center;margin-bottom:4px;}
  .sheet .sub{font-size:12px;color:var(--muted);text-align:center;margin-bottom:12px;}
  .shopgrid{display:flex;flex-direction:column;gap:8px;}
  .shopitem{display:flex;align-items:center;gap:10px;background:#fff;border-radius:12px;padding:10px 12px;}
  .shopitem .si{font-size:24px;} .shopitem .sinfo{flex:1;} .shopitem .snm{font-weight:700;font-size:14px;}
  .shopitem .sdesc{font-size:11px;color:var(--muted);}
  .buy{background:var(--wx);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;}
  .buy:active{transform:scale(.95);} .buy.own{background:#ddd;color:#888;}
  .btn{display:block;width:100%;background:var(--wx);color:#fff;border:none;border-radius:12px;padding:13px;font-size:16px;font-weight:800;cursor:pointer;margin-top:12px;}
  .btn.ghost{background:#e6e6e6;color:#333;}
  .btn:active{transform:scale(.98);}
  .ach{display:flex;align-items:center;gap:10px;background:#fff;border-radius:10px;padding:9px 12px;margin-bottom:7px;}
  .ach .m{font-size:22px;} .ach .at{font-size:13px;font-weight:700;} .ach .ad{font-size:11px;color:var(--muted);}
  .startlogo{font-size:54px;text-align:center;}
  .rules{font-size:12px;color:#555;line-height:1.8;background:#fff;border-radius:12px;padding:12px;margin:10px 0;}
  .rules b{color:#000;}
  .invbar{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:6px;}
  .inv{font-size:11px;background:#fff;border:1px solid #e0e0e0;border-radius:14px;padding:3px 9px;color:#333;cursor:pointer;}
  .inv:active{transform:scale(.94);} .inv.dis{opacity:.4;}
</style>
</head>
<body>
<div id="app"><div id="phone">
  <div class="nav">
    <span class="back" id="quitBtn">‹</span>
    <span class="gname">微信群权力战争 <small id="hdCount">(128)</small></span>
    <span class="more" id="shopTop">···</span>
  </div>
  <div class="status">
    <span class="role" id="roleTag">👑 群主</span>
    <span class="chip">第 <b id="roundN">1</b>/20 轮</span>
    <span class="chip">💰<b id="coinN">5</b></span>
    <span class="chip">❤<b id="hpN">5</b></span>
    <span class="chip">🛡<b id="shieldN">0</b></span>
    <div class="barwrap">
      <span class="lab">📊舆论值</span>
      <div class="bar"><i id="opBar"></i><span class="txt" id="opTxt">100</span></div>
    </div>
    <div class="invbar" id="invBar"></div>
  </div>
  <div id="chat"></div>
  <div class="dock">
    <div class="hintline" id="hint">轮到你了，选择一个行动 ↓</div>
    <div class="acts" id="acts"></div>
  </div>

  <!-- 开始 -->
  <div class="overlay" id="startScreen">
    <div class="sheet">
      <div class="startlogo">👑💬⚔️</div>
      <h2>微信群权力战争</h2>
      <div class="sub">你是 128 人大群的群主，坐稳你的宝座！</div>
      <div class="rules">
        🎯 目标：撑过 <b>20 轮</b>，保住群主之位。<br>
        📊 <b>舆论值</b> 是你的支持率：<br>
        · ≥80 → 群管理获得 <b>护盾</b><br>
        · &lt;50 → 全群开始怀疑你<br>
        · &lt;20 → 触发 <b>弹劾大会</b>，可能下台！<br>
        ⚔️ 媒体曝光、成员举报、官方踢人都会攻击你（❤-1）。<br>
        🛒 用金币买护盾/红包/道具反击，每 5 轮还有<b>全民选举</b>。
      </div>
      <button class="btn" id="startBtn">▶ 上任群主</button>
    </div>
  </div>

  <!-- 商店 -->
  <div class="overlay hidden" id="shopScreen">
    <div class="sheet">
      <h2>🛒 群道具商店</h2>
      <div class="sub">💰 金币：<b id="shopCoins">5</b></div>
      <div class="shopgrid" id="shopGrid"></div>
      <button class="btn ghost" id="shopClose">关闭</button>
    </div>
  </div>

  <!-- 结算 -->
  <div class="overlay hidden" id="overScreen">
    <div class="sheet">
      <h2 id="overTitle">游戏结束</h2>
      <div class="sub" id="overSub"></div>
      <div id="achList"></div>
      <button class="btn" id="againBtn">🔁 再当一次群主</button>
      <button class="btn ghost" id="homeBtn2">← 返回游戏厅</button>
    </div>
  </div>
</div></div>

<script>
"use strict";
/*==================== 数据 ====================*/
const NPCS=[
  {n:"管理员·老张",a:"🛡"},{n:"管理员·阿珍",a:"🛡"},{n:"核心·大彪",a:"💎"},{n:"组长·小美",a:"📢"},
  {n:"成员·路人甲",a:"👥"},{n:"成员·吃瓜王",a:"👥"},{n:"成员·夜猫子",a:"👥"},{n:"媒体·真相报",a:"📰"},
  {n:"媒体·爆料君",a:"📰"},{n:"官方·工作人员",a:"🏢"},{n:"官方·主管",a:"🏢"},{n:"游客·6666",a:"👀"},
  {n:"黑客·匿名",a:"🕵️"},{n:"卧底·？？",a:"👻"},
];
const pick=a=>a[Math.floor(Math.random()*a.length)];
const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;

// 世界事件牌（每轮1张）
const EVENTS=[
  {t:"🟥 腾讯服务器维护",d:"本轮所有道具失效！",f:g=>g.itemsLocked=true},
  {t:"🔥 上了热搜",d:"媒体火力全开，本轮曝光伤害+50%。",f:g=>g.heat=true},
  {t:"📵 网络异常",d:"信息混乱，本轮舆论波动更大。",f:g=>g.chaos=true},
  {t:"🧧 红包雨",d:"群里发红包，你 +2 金币！",f:g=>g.coins+=2},
  {t:"🆙 系统升级",d:"管理员+1，管理更混乱，舆论 -3。",f:g=>op(g,-3)},
  {t:"🤖 AI 审核",d:"随机封禁一名闹事者，你少一个威胁。",f:g=>{g.threats=Math.max(0,g.threats-1);}},
  {t:"🦠 病毒传播",d:"随机 2 人被禁言，群里安静了，舆论 +3。",f:g=>op(g,3)},
  {t:"🔀 微信更新",d:"全员职位重新洗牌！舆论大幅波动。",f:g=>op(g, Math.random()<.5?-8:8)},
  {t:"🌧 网络水军",d:"有人带节奏黑你，舆论 -5。",f:g=>op(g,-5)},
  {t:"🎉 群庆典",d:"群满 128 人，气氛火热，舆论 +5。",f:g=>op(g,5)},
];

// AI 攻击/事件池
const AI_ACTS=[
  {w:26, kind:"attack", msg:["曝光群主私聊记录！","独家：群主暗箱操作实锤？","爆料群主收黑钱！"], who:"📰", op:-6, hp:1, tag:"曝光"},
  {w:16, kind:"attack", msg:["我举报群主滥用职权！","@所有人 群主踢错人了！","实名举报群主！"], who:"👥", op:-4, hp:0, tag:"举报"},
  {w:12, kind:"attack", msg:["管理员误踢了核心成员…","管理员权限出事了","踢错人引发不满"], who:"🛡", op:-5, hp:0, tag:"内乱"},
  {w:10, kind:"attack", msg:["微信官方介入调查群主","官方：该群主涉嫌违规","工作人员盯上群主了"], who:"🏢", op:-3, hp:1, tag:"官方"},
  {w:8,  kind:"good",   msg:["官方公关帮群主澄清了","主管替群主说了好话","风评被官方带回来一点"], who:"🏢", op:4, hp:0, tag:"公关"},
  {w:8,  kind:"noise",  msg:["6666666666","？？？？？","哈哈哈哈哈哈","......","表情包轰炸🤣🤣🤣"], who:"👀", op:0, hp:0, tag:"刷屏"},
  {w:6,  kind:"attack", msg:["黑客破解了群主身份！","有人删了群主的证据","匿名黑客搞事情"], who:"🕵️", op:-4, hp:0, tag:"黑客"},
  {w:5,  kind:"attack", msg:["卧底煽动大家不满","内部有人搞事…","？？的身份很可疑"], who:"👻", op:-3, hp:0, tag:"卧底"},
];

// 商店
const SHOP=[
  {id:"shield", nm:"护盾", price:2, ico:"🛡", d:"抵挡下一次攻击"},
  {id:"medkit", nm:"医疗包", price:3, ico:"💊", d:"恢复 1 点血量"},
  {id:"report", nm:"举报卡", price:1, ico:"📣", d:"反举报，舆论 +6"},
  {id:"investigate", nm:"调查卡", price:2, ico:"🔍", d:"揪出闹事者，减少一个威胁"},
  {id:"disguise", nm:"身份伪装", price:4, ico:"🎭", d:"下一轮不被攻击"},
  {id:"spam", nm:"刷屏卡", price:1, ico:"💥", d:"刷屏搅局，舆论 +3 并消一次曝光"},
  {id:"revive", nm:"复活券", price:5, ico:"🎟", d:"淘汰时自动复活一次"},
];
const ITEM=Object.fromEntries(SHOP.map(s=>[s.id,s]));

/*==================== 状态 ====================*/
let g=null;
function op(state,d){ state.op=clamp(Math.round(state.op+d),0,120); }

function newGame(){
  g={ round:1, op:100, coins:5, hp:5, maxhp:5, shield:0,
      inv:{shield:0,medkit:0,report:0,investigate:0,disguise:0,spam:0,revive:0},
      threats:2, acted:false, over:false, itemsLocked:false, heat:false, chaos:false,
      disguised:false, exposeQueued:0, shieldGiven80:false, impeachWarned:false,
      stats:{gongguan:0,kicks:0,redpackets:0,speeches:0,reports:0,maxop:100,attacksTaken:0,itemsUsed:0,coinsSpent:0},
  };
  document.getElementById("chat").innerHTML="";
  sys("👑 你上任成为「128人大群」群主，坐稳你的宝座！","event");
  sys("目标：撑过 20 轮，保住群主之位。舆论值越高越稳。");
  startRound();
  sync();
}

/*==================== 消息 ====================*/
const chat=document.getElementById("chat");
function scroll(){ chat.scrollTop=chat.scrollHeight; }
function sys(text,cls){ const d=document.createElement("div"); d.className="sys"+(cls?" "+cls:""); d.textContent=text; chat.appendChild(d); scroll(); }
function msg(who,avatar,text,me){ const w=document.createElement("div"); w.className="msg"+(me?" me":"");
  w.innerHTML=`<div class="av">${avatar}</div><div class="body">${me?"":`<div class="who">${who}</div>`}<div class="bub">${text}</div></div>`;
  chat.appendChild(w); scroll(); }
function meSay(text){ msg("群主","👑",text,true); }

/*==================== 回合流程 ====================*/
function startRound(){
  g.acted=false; g.itemsLocked=false; g.heat=false; g.chaos=false; g.exposeQueued=0;
  sys(`—— 第 ${g.round} 轮 ——`);
  // 1) 世界事件牌
  const ev=pick(EVENTS);
  sys(`🎴 事件牌：${ev.t}｜${ev.d}`,"event");
  ev.f(g);
  // 2) AI 行动（舆论高则围攻少；后期更激烈）
  if(g.disguised){ sys("🎭 你伪装成普通成员，本轮无人攻击你。","good"); g.disguised=false; }
  else {
    const num = 1 + (Math.random()<0.5?1:0) + (g.op<35?1:0) + (g.round>13?1:0);
    for(let i=0;i<num;i++) aiAct();
  }
  // 3) 轮到你
  g.acted=false;
  setHint("轮到你了，选一个行动（每轮1次）");
  renderActs();
  sync();
}

function aiAct(){
  // 加权抽一个 AI 行为
  let tot=AI_ACTS.reduce((s,a)=>s+a.w,0), r=Math.random()*tot, act=AI_ACTS[0];
  for(const a of AI_ACTS){ r-=a.w; if(r<=0){ act=a; break; } }
  const npc=pick(NPCS.filter(n=>n.a===act.who).length?NPCS.filter(n=>n.a===act.who):NPCS);
  const text=pick(act.msg);
  msg(npc.n, npc.a, text, false);
  if(act.kind==="noise"){ if(g.chaos) op(g, Math.random()<.5?-1:1); return; }
  if(act.kind==="good"){ op(g, act.op); sys(`👍 ${act.tag}：舆论 ${act.op>0?"+":""}${act.op}`,"good"); return; }
  // attack（HP 伤害约55%概率发生）
  let dop=act.op, dhp=act.hp? (Math.random()<0.55?1:0):0;
  if(g.heat && act.who==="📰"){ dop=Math.round(dop*1.5); dhp=1; }
  if(g.chaos) dop-=2;
  if(g.op<45) dop-=2;                     // 怀疑期，攻击更狠
  // 护盾抵挡
  if(g.shield>0 && (dhp>0||dop<=-5)){ g.shield--; sys(`🛡 护盾抵挡了「${act.tag}」！`,"good"); renderInv(); return; }
  op(g,dop); if(dhp>0){ g.hp-=dhp; g.stats.attacksTaken++; }
  if(act.tag==="曝光") g.exposeQueued++;
  sys(`💥 ${act.tag}：舆论 ${dop}${dhp?`，❤-${dhp}`:""}`,"bad");
  if(g.hp<=0) checkDeath();
}

/*==================== 玩家行动 ====================*/
const ACTIONS=[
  {id:"speak", ico:"📢", nm:"发言拉票", do:()=>{ op(g,4); g.coins+=1; g.stats.speeches++; meSay(pick(["各位群友信我！我一心为群！","造谣的别得逞，我清者自清！","跟着我，群里天天有红包！"])); flashOp("发言拉票 舆论 +4，💰+1"); }},
  {id:"pr", ico:"🤝", nm:"公关", cost:2, do:()=>{ if(!spend(2))return false; op(g,8); g.exposeQueued=0; g.stats.gongguan++; meSay("这事我已经处理好了，官方那边打好招呼了。"); flashOp("公关 舆论 +8，曝光已压下"); }},
  {id:"kick", ico:"👢", nm:"踢人", do:()=>{ if(Math.random()<0.2){ op(g,-5); g.stats.kicks++; meSay("这个刺头，踢了！"); sys("😱 你踢错了人！群友不满，舆论 -5","bad"); }
      else { g.threats=Math.max(0,g.threats-1); op(g,2); g.stats.kicks++; meSay("这个搞事的，踢出去。"); flashOp("踢掉一个威胁，舆论 +2"); } }},
  {id:"redpacket", ico:"🧧", nm:"发红包", cost:3, do:()=>{ if(!spend(3))return false; op(g,12); g.stats.redpackets++; meSay("【群主发了一个 88 元红包】🧧"); flashOp("发红包 舆论 +12"); }},
  {id:"buyshield", ico:"🛡", nm:"加护盾", cost:2, do:()=>{ if(!spend(2))return false; g.shield++; meSay("先给自己加个防护。"); flashOp("获得 1 层护盾"); renderInv(); }},
  {id:"shop", ico:"🛒", nm:"商店", noturn:true, do:()=>openShop()},
];

function renderActs(){
  const box=document.getElementById("acts"); box.innerHTML="";
  ACTIONS.forEach(a=>{
    const el=document.createElement("div"); el.className="act"+(a.id==="redpacket"?" ":"")+((a.cost&&g.coins<a.cost)?" dis":"")+(g.acted&&!a.noturn?" dis":"");
    el.innerHTML=`<div class="ico">${a.ico}</div><div class="nm">${a.nm}</div>${a.cost?`<div class="cost">💰${a.cost}</div>`:""}`;
    el.onclick=()=>doAction(a); box.appendChild(el);
  });
}
function doAction(a){
  if(g.over) return;
  if(a.noturn){ a.do(); return; }
  if(g.acted){ setHint("本轮已行动，点「结束本轮」进入下一轮"); return; }
  const r=a.do();
  if(r===false) return;
  g.acted=true;
  renderActs(); sync();
  // 行动后自动结算并进入下一轮（给一点停顿感）
  setHint("结算中…");
  setTimeout(endRound, 500);
}

function endRound(){
  if(g.over) return;
  // 阈值判定
  g.stats.maxop=Math.max(g.stats.maxop,g.op);
  if(g.op>=80 && !g.shieldGiven80){ g.shield++; g.shieldGiven80=true; sys("🛡 舆论≥80，群管理获得 1 层护盾！","good"); }
  if(g.op<80) g.shieldGiven80=false;
  if(g.op<50 && g.op>=20 && !g.impeachWarned){ sys("⚠ 舆论跌破 50，全群开始怀疑你…小心！","bad"); }
  // 选举（每5轮）
  if(g.round%5===0 && !g.over){ election(); if(g.over) return; }
  // 弹劾（<20）
  if(g.op<20 && !g.over){ impeach(); if(g.over) return; }
  // 胜利
  if(g.round>=20){ win(); return; }
  g.round++;
  renderInv();
  startRound();
}

function election(){
  sys("🗳 —— 第 "+g.round+" 轮：全民选举 —— ","event");
  const support=clamp(g.op + rand(-12,12), 0,120);
  if(support>=45){ sys(`✅ 选举通过！支持率 ${Math.round(support)}%，你连任群主。`,"good"); op(g,3); }
  else { sys(`❌ 选举失败！支持率仅 ${Math.round(support)}%，你被投下台了…`,"bad"); lose("竞选失败，你被赶下了群主之位"); }
}

function impeach(){
  sys("🗳 —— 弹劾大会 —— ","event");
  sys("舆论过低，全群发起弹劾投票！","bad");
  const passFire = Math.random() < (0.35 + (20-g.op)*0.03);  // 舆论越低越危险
  if(g.inv.report>0){ g.inv.report--; op(g,10); sys("📣 你打出举报卡自辩，舆论 +10！","good"); renderInv(); }
  if(g.op>=20 && !passFire){ sys("😮‍💨 你惊险过关，暂时保住了位置。","good"); }
  else if(passFire){ lose("弹劾通过，你被踢出了群主之位"); }
  else { sys("😮‍💨 舆论回升，弹劾未通过。","good"); }
}

function checkDeath(){
  if(g.hp>0) return false;
  if(g.inv.revive>0){ g.inv.revive--; g.hp=3; sys("🎟 复活券生效！你满血归来（❤3）。","good"); renderInv(); return false; }
  lose("你被攻击淘汰了（❤ 归零）"); return true;
}

/*==================== 结束 ====================*/
function win(){ g.over=true; showOver(true); }
function lose(reason){ g.over=true; g.loseReason=reason; showOver(false); }

function showOver(won){
  document.getElementById("acts").innerHTML="";
  const power=g.op + g.coins*2 + g.hp*5 + g.round*3;
  document.getElementById("overTitle").textContent = won? "🏆 你守住了群主之位！" : "💀 群主之位不保";
  document.getElementById("overSub").innerHTML = (won
    ? `撑过全部 20 轮！最终舆论 <b>${g.op}</b>`
    : `第 ${g.round} 轮 · ${g.loseReason}`) + ` · 权力值 <b>${power}</b>`;
  // 成就
  const A=[];
  const s=g.stats;
  if(won) A.push(["🏅","最强群主","坐稳20轮宝座"]);
  if(s.maxop>=110) A.push(["📈","民心所向","舆论一度超过110"]);
  if(s.redpackets>=3) A.push(["🧧","红包大户","发了"+s.redpackets+"个红包收买人心"]);
  if(s.gongguan>=3) A.push(["🤝","公关大师",""+s.gongguan+"次成功公关"]);
  if(s.kicks>=4) A.push(["👢","铁腕群主","踢了"+s.kicks+"次人"]);
  if(s.attacksTaken>=5) A.push(["🛡","挨打王","硬抗了"+s.attacksTaken+"次攻击"]);
  if(s.speeches>=6) A.push(["🎤","嘴强王者","发言拉票"+s.speeches+"次"]);
  if(g.coins>=15) A.push(["💰","财大气粗","攒下"+g.coins+"金币"]);
  if(A.length===0) A.push(["🎗","参与奖","下次一定当上最强群主！"]);
  document.getElementById("achList").innerHTML = A.map(a=>
    `<div class="ach"><span class="m">${a[0]}</span><div><div class="at">${a[1]}</div><div class="ad">${a[2]}</div></div></div>`).join("");
  document.getElementById("overScreen").classList.remove("hidden");
}

/*==================== 商店 & 道具 ====================*/
function openShop(){
  const grid=document.getElementById("shopGrid"); grid.innerHTML="";
  document.getElementById("shopCoins").textContent=g.coins;
  SHOP.forEach(it=>{
    const el=document.createElement("div"); el.className="shopitem";
    el.innerHTML=`<span class="si">${it.ico}</span><div class="sinfo"><div class="snm">${it.nm}</div><div class="sdesc">${it.d}</div></div>`;
    const b=document.createElement("button"); b.className="buy"+(g.coins<it.price?" own":"");
    b.textContent="💰"+it.price; b.onclick=()=>buy(it); el.appendChild(b); grid.appendChild(el);
  });
  document.getElementById("shopScreen").classList.remove("hidden");
}
function buy(it){
  if(g.coins<it.price){ setHint("金币不足"); return; }
  g.coins-=it.price; g.stats.coinsSpent+=it.price;
  if(it.id==="shield") g.shield++;
  else g.inv[it.id]=(g.inv[it.id]||0)+1;
  openShop(); renderInv(); sync();
  sys(`🛒 购买了「${it.nm}」`,"good");
}
function useItem(id){
  if(g.over) return;
  if(g.itemsLocked){ setHint("⚠ 腾讯维护中，本轮道具失效"); return; }
  if(!g.inv[id]||g.inv[id]<=0) return;
  const it=ITEM[id];
  g.inv[id]--; g.stats.itemsUsed++;
  if(id==="medkit"){ g.hp=Math.min(g.maxhp,g.hp+1); sys("💊 使用医疗包，❤+1","good"); }
  else if(id==="report"){ op(g,6); sys("📣 使用举报卡，舆论 +6","good"); }
  else if(id==="investigate"){ g.threats=Math.max(0,g.threats-1); op(g,2); sys("🔍 调查卡揪出一个闹事者，舆论 +2","good"); }
  else if(id==="disguise"){ g.disguised=true; sys("🎭 身份伪装，下一轮不被攻击","good"); }
  else if(id==="spam"){ op(g,3); g.exposeQueued=0; sys("💥 刷屏搅局，舆论 +3，曝光被顶下去了","good"); }
  else if(id==="shield"){ g.shield++; sys("🛡 使用护盾","good"); }
  renderInv(); sync();
}
function renderInv(){
  const bar=document.getElementById("invBar"); bar.innerHTML="";
  const order=["shield","medkit","report","investigate","disguise","spam","revive"];
  let any=false;
  order.forEach(id=>{ const n=(id==="shield"?g.shield:g.inv[id])||0; if(n<=0) return; any=true;
    const it=ITEM[id]; const el=document.createElement("span"); el.className="inv"+((g.itemsLocked&&id!=="shield")?" dis":"");
    el.textContent=`${it.ico}${it.nm}×${n}`;
    if(id!=="shield"&&id!=="revive") el.onclick=()=>useItem(id);
    bar.appendChild(el); });
  if(!any){ const el=document.createElement("span"); el.className="inv dis"; el.textContent="🎒 背包空（去商店买道具）"; bar.appendChild(el); }
}

/*==================== 工具 ====================*/
function spend(n){ if(g.coins<n){ setHint("金币不足，去商店或发言攒钱"); return false; } g.coins-=n; g.stats.coinsSpent+=n; return true; }
function setHint(t){ document.getElementById("hint").textContent=t; }
function flashOp(t){ sys("✅ "+t,"good"); }
function sync(){
  document.getElementById("roundN").textContent=g.round;
  document.getElementById("coinN").textContent=g.coins;
  document.getElementById("hpN").textContent=Math.max(0,g.hp);
  document.getElementById("shieldN").textContent=g.shield;
  const o=g.op; const bar=document.getElementById("opBar"), txt=document.getElementById("opTxt");
  bar.style.width=Math.min(100,o/120*100)+"%";
  bar.style.background = o>=80?"linear-gradient(90deg,#07c160,#39d67f)" : o>=50?"linear-gradient(90deg,#ffbe3d,#ffd76a)" : o>=20?"linear-gradient(90deg,#ff8c3b,#ffab5e)" : "linear-gradient(90deg,#fa5151,#ff7a7a)";
  txt.textContent=o;
  document.getElementById("hdCount").textContent="("+(128 - (5-Math.max(0,g.hp)))+")";
}

/*==================== 按钮 ====================*/
document.getElementById("startBtn").onclick=()=>{ document.getElementById("startScreen").classList.add("hidden"); newGame(); };
document.getElementById("shopClose").onclick=()=>document.getElementById("shopScreen").classList.add("hidden");
document.getElementById("shopTop").onclick=()=>{ if(g&&!g.over) openShop(); };
document.getElementById("againBtn").onclick=()=>{ document.getElementById("overScreen").classList.add("hidden"); newGame(); };
document.getElementById("quitBtn").onclick=()=>{ if(history.length>1) history.back(); else location.href="index.html"; };
document.getElementById("homeBtn2").onclick=()=>{ location.href="index.html"; };

/* 暴露给测试 */
if(typeof window!=="undefined") window.__ww={get g(){return g;}, newGame, doAction, ACTIONS, endRound, aiAct, buy, useItem, ITEM};
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>微域战争：果蝇帝国</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;}
  :root{--bg:#0d1410;--panel:#16211a;--panel2:#1f2e24;--line:#2f4636;--ink:#eafff0;--muted:#8fb39c;
    --you:#48d17a;--you-d:#2f9e54;--foe:#e0554b;--sugar:#ffcf4a;--gold:#ffcf4a;}
  html,body{height:100%;background:#000;color:var(--ink);overflow:hidden;}
  #app{height:100%;display:flex;align-items:center;justify-content:center;}
  #game{position:relative;width:100%;max-width:500px;aspect-ratio:500/760;}
  canvas{width:100%;height:100%;display:block;background:#0d1410;border-radius:12px;touch-action:none;}
  /* HUD */
  #hud{position:absolute;top:0;left:0;right:0;height:38px;display:flex;align-items:center;gap:10px;padding:0 10px;
    background:linear-gradient(180deg,rgba(20,30,22,.95),rgba(20,30,22,.5));font-size:13px;font-weight:800;pointer-events:none;}
  #hud .sugar{color:var(--sugar);} #hud .timer{margin-left:auto;font-family:ui-monospace,monospace;}
  #hud .nodes{color:var(--muted);font-weight:700;font-size:12px;}
  /* 底部操作 */
  #dock{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(180deg,rgba(15,22,16,.4),#10160f);
    border-top:1px solid var(--line);padding:6px 6px 8px;}
  .barrow{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;} .barrow::-webkit-scrollbar{display:none;}
  .ucard{flex:0 0 auto;width:58px;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:5px 3px;cursor:pointer;text-align:center;position:relative;transition:transform .05s;}
  .ucard:active{transform:scale(.94);} .ucard.dis{opacity:.4;}
  .ucard .ui{font-size:19px;} .ucard .un{font-size:9px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ucard .uc{font-size:10px;color:var(--sugar);font-weight:900;}
  .ucard .cd{position:absolute;left:0;bottom:0;width:100%;background:rgba(0,0,0,.55);border-radius:0 0 8px 8px;}
  .skills{display:flex;gap:6px;margin-top:5px;}
  .skill{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:6px 3px;cursor:pointer;text-align:center;position:relative;}
  .skill:active{transform:scale(.96);} .skill.dis{opacity:.45;}
  .skill .si{font-size:16px;} .skill .sn{font-size:10px;font-weight:700;}
  .skill .cd{position:absolute;left:0;bottom:0;width:100%;background:rgba(0,0,0,.55);height:0;border-radius:0 0 8px 8px;}
  /* 覆盖层 */
  .overlay{position:absolute;inset:0;background:rgba(6,10,7,.92);display:flex;align-items:center;justify-content:center;z-index:20;padding:16px;}
  .overlay.hidden{display:none;}
  .sheet{background:var(--panel);border:1px solid var(--line);border-radius:16px;width:100%;max-width:440px;max-height:92%;overflow-y:auto;padding:16px;}
  .sheet h2{font-size:20px;text-align:center;margin-bottom:4px;}
  .sheet .sub{font-size:12px;color:var(--muted);text-align:center;margin-bottom:12px;line-height:1.6;}
  .heroes{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .hero{background:#111a13;border:2px solid var(--line);border-radius:12px;padding:10px;text-align:center;cursor:pointer;transition:border-color .1s;}
  .hero:hover{border-color:var(--you-d);} .hero .hi{font-size:30px;} .hero .hn{font-weight:800;font-size:14px;margin-top:2px;} .hero .hd{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4;}
  .btn{display:block;width:100%;background:var(--you);color:#062;border:none;border-radius:12px;padding:12px;font-size:16px;font-weight:900;cursor:pointer;margin-top:10px;}
  .btn.ghost{background:#243;color:var(--ink);} .btn:active{transform:scale(.98);}
  .toast{position:absolute;top:46px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border:1px solid var(--line);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;z-index:15;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;}
  .rules{font-size:12px;color:#bfe;line-height:1.7;background:#111a13;border-radius:10px;padding:10px;margin:8px 0;text-align:left;}
</style>
</head>
<body>
<div id="app"><div id="game">
  <canvas id="cv" width="500" height="760"></canvas>
  <div id="hud">
    <span class="sugar">🍬 <b id="hSugar">0</b></span>
    <span class="nodes">🍎 你 <b id="hNodesY">0</b> · 敌 <b id="hNodesE">0</b></span>
    <span class="timer" id="hTimer">4:00</span>
  </div>
  <div class="toast" id="toast"></div>
  <div id="dock">
    <div class="barrow" id="uBar"></div>
    <div class="skills" id="skills"></div>
  </div>

  <!-- 开始/选英雄 -->
  <div class="overlay" id="startScreen">
    <div class="sheet">
      <h2>🪰 微域战争 · 果蝇帝国</h2>
      <div class="sub">在厨房与果园的微观世界，指挥你的果蝇军团！</div>
      <div class="rules">
        🍬 抢占 <b>水果资源点</b> → 持续产糖 → 造兵 → 推平敌方 <b>母巢🕳</b> 即胜。<br>
        👆 点下方卡片<b>造兵</b>（在你母巢孵化）；点地图设<b>集结点🚩</b>指挥全军。<br>
        ⏱ 4 分钟到点则<b>控制资源点多</b>者胜。先选一位英雄：
      </div>
      <div class="heroes" id="heroGrid"></div>
    </div>
  </div>

  <!-- 结算 -->
  <div class="overlay hidden" id="overScreen">
    <div class="sheet">
      <h2 id="overTitle">胜利</h2>
      <div class="sub" id="overSub"></div>
      <button class="btn" id="againBtn">🔁 再战一局</button>
      <button class="btn ghost" id="homeBtn">← 返回游戏厅</button>
    </div>
  </div>
</div></div>

<script>
"use strict";
const cv=document.getElementById("cv"), ctx=cv.getContext("2d");
const W=500, H=760, TOP=40, BOT=132;   // 上HUD 40，下操作区约132
const rand=(a,b)=>a+Math.random()*(b-a);
const ri=(a,b)=>Math.floor(rand(a,b+1));
const pick=a=>a[Math.floor(Math.random()*a.length)];
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);

/*==================== 数据 ====================*/
const HEROES=[
  {id:"queen",  ico:"👑", nm:"女王",  d:"造兵便宜15%，糖产+20%"},
  {id:"general",ico:"🎖", nm:"将军",  d:"全军攻击+20%"},
  {id:"scientist",ico:"🔬",nm:"科学家",d:"技能冷却-40%"},
  {id:"engineer",ico:"🔧",nm:"工程师",d:"母巢生命+50%"},
  {id:"hunter", ico:"🏹", nm:"猎手",  d:"侦查/远程射程+25%，视野更广"},
];
// 兵种（玩家与AI通用）
const UNITS=[
  {k:"scout", ico:"🐝", nm:"侦查蝇", cost:20, hp:40,  dmg:6,  range:18, spd:120, cd:1.0, role:"melee", cap:2.2, desc:"快·抢点"},
  {k:"melee", ico:"🪰", nm:"战斗蝇", cost:35, hp:90,  dmg:14, range:16, spd:78,  cd:0.9, role:"melee", desc:"标准近战"},
  {k:"tank",  ico:"🛡", nm:"重甲蝇", cost:70, hp:260, dmg:12, range:16, spd:58,  cd:1.1, role:"melee", def:0.4, desc:"高防肉盾"},
  {k:"zerk",  ico:"😡", nm:"狂暴蝇", cost:45, hp:80,  dmg:16, range:16, spd:92,  cd:0.7, role:"melee", zerk:1, desc:"血越低攻越高"},
  {k:"acid",  ico:"🟢", nm:"酸液蝇", cost:50, hp:55,  dmg:16, range:95, spd:66,  cd:1.1, role:"ranged", desc:"远程喷酸"},
  {k:"poison",ico:"🟣", nm:"毒液蝇", cost:55, hp:55,  dmg:9,  range:85, spd:66,  cd:1.2, role:"ranged", poison:1, desc:"持续中毒"},
  {k:"split", ico:"🥚", nm:"裂变蝇", cost:40, hp:70,  dmg:10, range:16, spd:80,  cd:0.9, role:"melee", split:1, desc:"死亡分裂"},
  {k:"boom",  ico:"💥", nm:"爆裂蝇", cost:45, hp:60,  dmg:8,  range:16, spd:100, cd:0.9, role:"melee", boom:1, desc:"死亡爆炸"},
  {k:"heal",  ico:"➕", nm:"治疗蝇", cost:60, hp:65,  dmg:0,  range:80, spd:70,  cd:0.8, role:"heal", heal:14, desc:"治疗友军"},
  {k:"storm", ico:"🌪", nm:"风暴巨蝇",cost:180,hp:420, dmg:26, range:70, spd:52,  cd:1.3, role:"ranged", aoe:34, desc:"范围强袭·精英"},
];
const UBY=Object.fromEntries(UNITS.map(u=>[u.k,u]));
const SKILLS=[
  {id:"burst", ico:"🍬", nm:"糖源爆发", cd:35, do:()=>{ g.sugar+=180; toast("🍬 糖源爆发 +180"); }},
  {id:"hatch", ico:"🥚", nm:"快速孵化", cd:45, do:()=>{ for(let i=0;i<4;i++) spawn(0,"melee",true); toast("🥚 快速孵化：4 战斗蝇"); }},
  {id:"storm", ico:"🌪", nm:"黑风暴",   cd:60, do:()=>{ g.buffYou=8; toast("🌪 黑风暴：全军攻击+60% 8秒"); }},
];

/*==================== 状态 ====================*/
let g=null, MOD=null;
function newGame(heroId){
  const hero=HEROES.find(h=>h.id===heroId);
  MOD={ costMult: hero.id==="queen"?0.85:1, sugarMult: hero.id==="queen"?1.2:1,
        dmgMult: hero.id==="general"?1.2:1, skillCd: hero.id==="scientist"?0.6:1,
        baseHp: hero.id==="engineer"?1.5:1, rangeMult: hero.id==="hunter"?1.25:1 };
  const nodes=[
    {x:W*0.5,  y:H*0.5,  kind:"🍎", big:1},
    {x:W*0.22, y:H*0.36, kind:"🥤"}, {x:W*0.78, y:H*0.36, kind:"🍞"},
    {x:W*0.22, y:H*0.64, kind:"🍞"}, {x:W*0.78, y:H*0.64, kind:"🥤"},
  ].map(n=>({...n, ctrl:0, owner:-1}));
  g={ running:true, over:false, t:0, timeLeft:240,
      sugar:120, eSugar:120, buffYou:0, buffFoe:0,
      you:{x:W/2, y:H-BOT-28, hp:1100*MOD.baseHp, max:1100*MOD.baseHp, team:0, zap:0},
      foe:{x:W/2, y:TOP+34, hp:1150, max:1150, team:1, zap:0},
      units:[], shots:[], parts:[], nodes, neutrals:[], rally:null, rallyT:0,
      cd:{}, skillCd:{}, eSpawnT:2, eventT:rand(20,35), hero:heroId,
  };
  UNITS.forEach(u=>g.cd[u.k]=0); SKILLS.forEach(s=>g.skillCd[s.id]=0);
  // 中立生物守中心
  g.neutrals.push(mkNeutral("🐜",g.nodes[0].x-24,g.nodes[0].y), mkNeutral("🕷️",g.nodes[0].x+24,g.nodes[0].y));
  buildBars(); syncHud();
}
function mkNeutral(ico,x,y){ const s=ico==="🐜"?{hp:220,dmg:14,def:.5}:{hp:120,dmg:22}; return {x,y,ico,team:2,hp:s.hp,max:s.hp,dmg:s.dmg,def:s.def||0,range:22,spd:20,atk:0,neutral:1,r:11}; }

/*==================== 造兵 ====================*/
function spawn(team,key,free){
  const u=UBY[key]; const base=team===0?g.you:g.foe;
  const e={ ...u, team, x:base.x+rand(-26,26), y:base.y+(team===0?-30:30), hp:u.hp, max:u.hp, atk:0, poiT:0, r:u.k==="storm"?12:(u.k==="tank"?9:7) };
  g.units.push(e);
  if(!free){ if(team===0) g.cd[key]=u.cd; }
  spawnParts(e.x,e.y,team===0?"#48d17a":"#e0554b",5);
  return e;
}
function tryBuild(key){
  const u=UBY[key]; const cost=Math.round(u.cost*MOD.costMult);
  if(g.cd[key]>0){ toast(`${u.nm}孵化中`); return; }
  if(g.sugar<cost){ toast("🍬 糖源不足"); return; }
  g.sugar-=cost; spawn(0,key); syncHud();
}

/*==================== 更新（无 canvas） ====================*/
function update(dt){
  if(!g||!g.running||g.over) return;
  g.t+=dt; g.timeLeft-=dt;
  if(g.buffYou>0) g.buffYou-=dt; if(g.buffFoe>0) g.buffFoe-=dt;
  // 冷却
  for(const k in g.cd) if(g.cd[k]>0) g.cd[k]=Math.max(0,g.cd[k]-dt);
  for(const s in g.skillCd) if(g.skillCd[s]>0) g.skillCd[s]=Math.max(0,g.skillCd[s]-dt);
  if(g.rallyT>0) g.rallyT-=dt;
  // 经济：底噪 + 控制的资源点
  let yNodes=0,eNodes=0;
  for(const n of g.nodes){ if(n.owner===0)yNodes++; else if(n.owner===1)eNodes++; }
  g.sugar  += (2 + yNodes*3)*MOD.sugarMult*dt;
  g.eSugar += (2 + eNodes*3)*1.2*dt;   // AI 经济加成，提升挑战
  // 资源点争夺
  for(const n of g.nodes){
    let net=0;
    for(const u of g.units){ if(u.dead) continue; const d=dist(u,n); if(d<(n.big?55:44)){ net += (u.team===0?1:-1)*(u.cap||1); } }
    n.ctrl=clamp(n.ctrl+net*dt*14, -100,100);
    n.owner = n.ctrl>=55?0 : n.ctrl<=-55?1 : (Math.abs(n.ctrl)<45? -1 : n.owner);
  }
  // 单位 AI
  updateUnits(dt);
  // 母巢自卫炮塔
  baseDefense(dt);
  // 中立
  for(const nu of g.neutrals){ if(nu.dead) continue; nu.atk-=dt;
    const tgt=nearestEnemy(nu, 70); if(tgt){ if(dist(nu,tgt)<nu.range+tgt.r){ if(nu.atk<=0){ nu.atk=1.2; damage(tgt,nu.dmg,nu); } } else moveToward(nu,tgt,dt); }
  }
  g.neutrals=g.neutrals.filter(n=>!n.dead);
  // 子弹
  for(const s of g.shots){ if(s.dead) continue; s.x+=s.vx*dt; s.y+=s.vy*dt; s.life-=dt;
    if(s.life<=0){ s.dead=true; continue; }
    const t=s.tgt; if(t&&!t.dead && dist(s,t)<t.r+6){ hitShot(s,t); s.dead=true; } }
  g.shots=g.shots.filter(s=>!s.dead);
  // 粒子
  for(const p of g.parts){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; }
  g.parts=g.parts.filter(p=>p.life>0);
  // 敌 AI
  enemyAI(dt);
  // 随机事件
  g.eventT-=dt; if(g.eventT<=0){ g.eventT=rand(28,45); randomEvent(); }
  // 清理死单位（触发死亡特效）
  for(const u of g.units){ if(u.hp<=0 && !u.dead){ u.dead=true; onDeath(u); } }
  g.units=g.units.filter(u=>!u.dead);
  // 胜负
  if(g.foe.hp<=0){ endGame(true,"你摧毁了敌方母巢！"); return; }
  if(g.you.hp<=0){ endGame(false,"你的母巢被攻陷了…"); return; }
  if(g.timeLeft<=0){ const yn=g.nodes.filter(n=>n.owner===0).length, en=g.nodes.filter(n=>n.owner===1).length;
    if(yn>en) endGame(true,`时间到！你控制 ${yn} 个资源点 > 敌 ${en}`);
    else if(en>yn) endGame(false,`时间到！敌方控制 ${en} 个资源点 > 你 ${yn}`);
    else endGame(g.you.hp>=g.foe.hp, g.you.hp>=g.foe.hp?"时间到！母巢血量占优，险胜！":"时间到！母巢血量落败…"); return; }
  syncHud();
}

function nearestEnemy(u, aggro){
  let best=null,bd=aggro||99999;
  for(const o of g.units){ if(o.dead||o.team===u.team) continue; if(u.team===2 && o.team===2) continue;
    const d=dist(u,o); if(d<bd){ bd=d; best=o; } }
  // 中立也算敌人（对玩家/敌AI）
  if(u.team!==2){ for(const nu of g.neutrals){ if(nu.dead) continue; const d=dist(u,nu); if(d<bd){bd=d;best=nu;} } }
  return best;
}
function objectiveFor(u){
  // 突袭兵直扑玩家母巢
  if(u.tgtBase && u.team===1) return g.you;
  // 优先：集结点 → 未控资源点 → 敌母巢
  if(g.rally && g.rallyT>0 && u.team===0) return g.rally;
  let best=null,bd=99999;
  for(const n of g.nodes){ if(n.owner===u.team) continue; const d=dist(u,n); if(d<bd){bd=d;best=n;} }
  const enemyBase=u.team===0?g.foe:g.you;
  if(!best || dist(u,enemyBase)<bd*0.8) return enemyBase;
  return best;
}
function updateUnits(dt){
  for(const u of g.units){ if(u.dead) continue; u.atk-=dt; if(u.poiT>0){ u.poiT-=dt; damage(u, 5*dt, null, true); }
    const buff = (u.team===0?g.buffYou:g.buffFoe)>0 ? 1.6 : 1;
    if(u.role==="heal"){ const f=lowAlly(u); if(f){ if(dist(u,f)<u.range){ if(u.atk<=0){ u.atk=u.cd; f.hp=Math.min(f.max,f.hp+u.heal); spawnParts(f.x,f.y,"#8effc0",3);} } else moveToward(u,f,dt); }
      else { const o=objectiveFor(u); moveToward(u,o,dt);} continue; }
    const range=u.range*(u.role==="ranged"?MOD.rangeMult:1)*(u.k==="scout"?MOD.rangeMult:1);
    const tgt=nearestEnemy(u, 150);
    const eb=u.team===0?g.foe:g.you;
    // 也考虑攻击敌方母巢
    let target=tgt, isBase=false;
    if(!target || dist(u,eb)<range+18){ if(dist(u,eb)<range+18){ target=eb; isBase=true; } }
    if(target){
      const rr=range+(target.r||18);
      if(dist(u,target)<=rr){ if(u.atk<=0){ u.atk=u.cd;
        let dmg=u.dmg*dmgMultOf(u)*buff;
        if(u.zerk) dmg*= 1 + (1-u.hp/u.max)*1.2;
        if(u.role==="ranged"){ fireShot(u,target,dmg,u.poison,u.aoe); }
        else { damage(target,dmg,u); if(u.aoe) aoeDamage(target,u.aoe,dmg*0.5,u); }
      } }
      else moveToward(u,target,dt);
    } else { const o=objectiveFor(u); moveToward(u,o,dt); }
  }
}
function lowAlly(u){ let best=null,bd=1; for(const o of g.units){ if(o.dead||o.team!==u.team||o===u) continue; const f=o.hp/o.max; if(f<bd&&f<1){ if(dist(u,o)<160){ bd=f; best=o; } } } return best; }
function moveToward(u,t,dt){ const dx=t.x-u.x, dy=t.y-u.y, d=Math.hypot(dx,dy)||1; const sp=u.spd*dt;
  u.x+=dx/d*sp; u.y+=dy/d*sp; u.x=clamp(u.x,8,W-8); u.y=clamp(u.y,TOP+8,H-BOT+40); }
function fireShot(u,t,dmg,poison,aoe){ const dx=t.x-u.x,dy=t.y-u.y,d=Math.hypot(dx,dy)||1;
  g.shots.push({x:u.x,y:u.y,vx:dx/d*260,vy:dy/d*260,tgt:t,dmg,poison,aoe,team:u.team,life:1.2,
    col:u.k==="poison"?"#c04cff":u.k==="storm"?"#7ad0ff":"#8ef07a"}); }
function hitShot(s,t){ damage(t,s.dmg,{team:s.team}); if(s.poison&&t.poiT!==undefined) t.poiT=3;
  if(s.aoe) aoeDamage(t,s.aoe,s.dmg*0.5,{team:s.team}); spawnParts(s.x,s.y,s.col,4); }
function aoeDamage(center,radius,dmg,src){ for(const o of g.units){ if(o.dead||(src&&o.team===src.team)) continue; if(dist(o,center)<radius) damage(o,dmg,src); }
  spawnParts(center.x,center.y,"#ffca6a",8); }
function damage(t,amount,src,dot){
  if(t.def) amount*= (1-t.def);
  t.hp-=amount; if(!dot) t.flash=0.1;
  if(t.hp<=0 && t.neutral && !t.dead){ t.dead=true; const bonus=t.ico==="🐜"?120:90;
    if(src&&src.team===0){ g.sugar+=bonus; toast(`击杀中立 +🍬${bonus}`);} else if(src&&src.team===1) g.eSugar+=bonus;
    spawnParts(t.x,t.y,"#ffcf4a",10); }
}
function baseDefense(dt){
  for(const base of [g.you,g.foe]){ base.zap-=dt; if(base.zap>0) continue;
    let t=null,bd=105; for(const u of g.units){ if(u.dead||u.team===base.team) continue; const d=dist(u,base); if(d<bd){bd=d;t=u;} }
    if(t){ base.zap=0.8; damage(t,16,{team:base.team}); spawnParts(t.x,t.y,base.team===0?"#8effc0":"#ff8f88",4); }
  }
}
function onDeath(u){
  spawnParts(u.x,u.y,u.team===0?"#48d17a":"#e0554b",8);
  if(u.split){ for(let i=0;i<2;i++){ const b=spawn(u.team,"scout",true); b.x=u.x+rand(-12,12); b.y=u.y+rand(-12,12); b.hp=b.max=28; b.dmg=6; } }
  if(u.boom){ aoeDamage(u,40,30,u); g.shake=0.15; }
}
// 便捷：玩家单位伤害倍率（英雄 将军 +20%）
function dmgMultOf(u){ return u.team===0?MOD.dmgMult:1; }

/*==================== 敌 AI ====================*/
function enemyAI(dt){
  g.eSpawnT-=dt; g.surgeT=(g.surgeT==null?rand(30,45):g.surgeT)-dt;
  const surge = g.surgeT<=0;
  if(surge){ g.surgeT=rand(46,64); g.buffFoe=6; toast("⚠ 敌军发动黑潮突袭！"); }
  if(g.eSpawnT<=0){
    const affordable=UNITS.filter(u=>u.cost<=g.eSugar);
    if(affordable.length){
      let choice;
      if(g.eSugar>200 && Math.random()<0.4) choice=UBY.storm.cost<=g.eSugar?UBY.storm:pick(affordable);
      else choice=pick(affordable);
      g.eSugar-=choice.cost; const e=spawn(1,choice.k,true);
      e.max=Math.round(choice.hp*1.12); e.hp=e.max; e.dmg=choice.dmg*1.08;   // AI 强度加成
      if(surge) e.tgtBase=1;   // 突袭直扑玩家母巢
    }
    g.eSpawnT=rand(1.1,2.1) * (g.timeLeft<120?0.7:1) * (surge?0.55:1);
    if(Math.random()<0.18) g.buffFoe=Math.max(g.buffFoe,5);
  }
}

/*==================== 随机事件 ====================*/
function randomEvent(){
  const ev=pick([
    {t:"👋 人类清扫！随机清除部分单位",f:()=>{ let n=0; g.units.forEach(u=>{ if(Math.random()<0.25){u.hp=0;n++;} }); g.neutrals.forEach(x=>{if(Math.random()<0.3)x.hp=0;}); return n; }},
    {t:"🍎 新水果坠落！中心糖源大增",f:()=>{ g.sugar+=150; g.eSugar+=150; }},
    {t:"🌬️ 强风吹散蝇群",f:()=>{ g.units.forEach(u=>{ u.x+=rand(-40,40); u.y+=rand(-30,30); }); }},
    {t:"💧 水流冲刷，双方微量减员",f:()=>{ g.units.forEach(u=>{ if(Math.random()<0.12)u.hp-=30; }); }},
    {t:"🐞 瓢虫援军！你的全军回血",f:()=>{ g.units.forEach(u=>{ if(u.team===0)u.hp=Math.min(u.max,u.hp+40); }); }},
  ]);
  ev.f(); toast(ev.t);
}

/*==================== 技能 ====================*/
function useSkill(id){
  const s=SKILLS.find(x=>x.id===id); if(g.skillCd[id]>0){ toast("技能冷却中"); return; }
  s.do(); g.skillCd[id]=s.cd*MOD.skillCd; syncHud();
}

/*==================== 渲染 ====================*/
let last=0;
function loop(ts){ requestAnimationFrame(loop); const dt=Math.min(0.05,(ts-last)/1000||0); last=ts;
  update(dt); render(); }
requestAnimationFrame(loop);
function render(){
  ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,W,H);
  if(g&&g.shake>0){ ctx.translate(rand(-4,4),rand(-4,4)); g.shake-=0.02; }
  // 背景（厨房台面网格）
  ctx.fillStyle="#0e150f"; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle="rgba(255,255,255,.03)"; ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
  for(let y=0;y<H;y+=40){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
  if(!g){ return; }
  // 资源点
  for(const n of g.nodes){ const r=n.big?26:20; const col=n.owner===0?"#48d17a":n.owner===1?"#e0554b":"#7d8b80";
    ctx.strokeStyle=col; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(n.x,n.y,r+5,0,7); ctx.stroke();
    // 控制条
    ctx.strokeStyle="rgba(255,255,255,.15)"; ctx.beginPath(); ctx.arc(n.x,n.y,r+5,-1.57, -1.57+(n.ctrl+100)/200*6.28); ctx.strokeStyle=col; ctx.stroke();
    ctx.font=(n.big?"30px":"24px")+" sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(n.kind,n.x,n.y); }
  // 集结点
  if(g.rally && g.rallyT>0){ ctx.font="20px sans-serif"; ctx.textAlign="center"; ctx.fillText("🚩",g.rally.x,g.rally.y-4); }
  // 母巢
  drawBase(g.foe,"#e0554b"); drawBase(g.you,"#48d17a");
  // 中立
  for(const nu of g.neutrals){ drawUnit(nu,"#c9a24a"); }
  // 单位
  for(const u of g.units) drawUnit(u, u.team===0?"#48d17a":"#e0554b");
  // 子弹
  for(const s of g.shots){ ctx.fillStyle=s.col; ctx.beginPath(); ctx.arc(s.x,s.y,4,0,7); ctx.fill(); }
  // 粒子
  for(const p of g.parts){ ctx.globalAlpha=Math.max(0,p.life/p.max); ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill(); }
  ctx.globalAlpha=1;
}
function drawBase(b,col){ ctx.font="40px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(b.team===0?"🕳️":"🕳️", b.x, b.y);
  // 血条
  const w=64,h=6,y=b.y+(b.team===0?26:-32); ctx.fillStyle="rgba(0,0,0,.5)"; ctx.fillRect(b.x-w/2,y,w,h);
  ctx.fillStyle=col; ctx.fillRect(b.x-w/2,y,w*Math.max(0,b.hp/b.max),h);
  ctx.strokeStyle=col; ctx.lineWidth=2; ctx.strokeRect(b.x-22,b.y-20,44,40); }
function drawUnit(u,col){ const r=u.r||7;
  ctx.fillStyle=u.flash>0?"#fff":col; ctx.beginPath(); ctx.arc(u.x,u.y,r,0,7); ctx.fill();
  if(u.flash>0)u.flash-=0.03;
  ctx.font=(r*1.5)+"px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(u.ico,u.x,u.y+0.5);
  if(u.hp<u.max){ const w=r*2.2,h=3,y=u.y-r-5; ctx.fillStyle="rgba(0,0,0,.6)"; ctx.fillRect(u.x-w/2,y,w,h);
    ctx.fillStyle=u.team===0?"#8effc0":(u.team===2?"#ffd76a":"#ff8f88"); ctx.fillRect(u.x-w/2,y,w*Math.max(0,u.hp/u.max),h); } }
function spawnParts(x,y,col,n){ for(let i=0;i<n;i++){ const a=rand(0,7),s=rand(30,110); g.parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:rand(1.5,3),col,life:0.4,max:0.4}); } }

/*==================== UI ====================*/
function buildBars(){
  const ub=document.getElementById("uBar"); ub.innerHTML="";
  UNITS.forEach(u=>{ const el=document.createElement("div"); el.className="ucard"; el.dataset.k=u.k;
    el.innerHTML=`<div class="ui">${u.ico}</div><div class="un">${u.nm}</div><div class="uc">🍬${Math.round(u.cost*MOD.costMult)}</div><div class="cd"></div>`;
    el.onclick=()=>tryBuild(u.k); ub.appendChild(el); });
  const sk=document.getElementById("skills"); sk.innerHTML="";
  SKILLS.forEach(s=>{ const el=document.createElement("div"); el.className="skill"; el.dataset.s=s.id;
    el.innerHTML=`<div class="si">${s.ico}</div><div class="sn">${s.nm}</div><div class="cd"></div>`;
    el.onclick=()=>useSkill(s.id); sk.appendChild(el); });
}
function syncHud(){
  document.getElementById("hSugar").textContent=Math.floor(g.sugar);
  document.getElementById("hNodesY").textContent=g.nodes.filter(n=>n.owner===0).length;
  document.getElementById("hNodesE").textContent=g.nodes.filter(n=>n.owner===1).length;
  const m=Math.max(0,Math.floor(g.timeLeft/60)), s=Math.max(0,Math.floor(g.timeLeft%60));
  document.getElementById("hTimer").textContent=m+":"+String(s).padStart(2,"0");
  // 卡片冷却/可购
  document.querySelectorAll(".ucard").forEach(el=>{ const u=UBY[el.dataset.k]; const cost=Math.round(u.cost*MOD.costMult);
    el.classList.toggle("dis", g.sugar<cost || g.cd[u.k]>0);
    el.querySelector(".cd").style.height=(g.cd[u.k]>0?(g.cd[u.k]/u.cd*100):0)+"%"; });
  document.querySelectorAll(".skill").forEach(el=>{ const s=SKILLS.find(x=>x.id===el.dataset.s);
    el.classList.toggle("dis", g.skillCd[s.id]>0);
    el.querySelector(".cd").style.height=(g.skillCd[s.id]>0?(g.skillCd[s.id]/(s.cd*MOD.skillCd)*100):0)+"%"; });
}
function toast(t){ const el=document.getElementById("toast"); el.textContent=t; el.classList.add("show"); clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove("show"),1400); }

/*==================== 输入：点地图设集结点 ====================*/
function toXY(e){ const r=cv.getBoundingClientRect(); const cx=(e.touches?e.touches[0].clientX:e.clientX), cy=(e.touches?e.touches[0].clientY:e.clientY);
  return {x:(cx-r.left)/r.width*W, y:(cy-r.top)/r.height*H}; }
function setRally(e){ if(!g||!g.running||g.over) return; const p=toXY(e);
  if(p.y<TOP+6 || p.y>H-BOT+30) return; g.rally={x:p.x,y:p.y}; g.rallyT=6; }
cv.addEventListener("click",setRally);
cv.addEventListener("touchstart",e=>{ setRally(e); },{passive:true});

/*==================== 胜负 ====================*/
function endGame(won,reason){ g.over=true; g.running=false;
  document.getElementById("overTitle").textContent=won?"🏆 胜利！":"💀 失败";
  document.getElementById("overSub").innerHTML=reason+`<br><br>英雄：${HEROES.find(h=>h.id===g.hero).ico}${HEROES.find(h=>h.id===g.hero).nm} · 用时 ${Math.floor((240-g.timeLeft)/60)}分${Math.floor((240-g.timeLeft)%60)}秒`;
  document.getElementById("overScreen").classList.remove("hidden");
}

/*==================== 启动 ====================*/
function buildHeroes(){ const box=document.getElementById("heroGrid"); box.innerHTML="";
  HEROES.forEach(h=>{ const el=document.createElement("div"); el.className="hero";
    el.innerHTML=`<div class="hi">${h.ico}</div><div class="hn">${h.nm}</div><div class="hd">${h.d}</div>`;
    el.onclick=()=>{ document.getElementById("startScreen").classList.add("hidden"); newGame(h.id); };
    box.appendChild(el); }); }
document.getElementById("againBtn").onclick=()=>{ document.getElementById("overScreen").classList.add("hidden"); document.getElementById("startScreen").classList.remove("hidden"); buildHeroes(); };
document.getElementById("homeBtn").onclick=()=>{ location.href="index.html"; };
buildHeroes();

if(typeof window!=="undefined") window.__mw={get g(){return g;}, newGame, update, spawn, tryBuild, useSkill, UNITS, UBY, HEROES, get MOD(){return MOD;}};
</script>
</body>

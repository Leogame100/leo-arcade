  if(Math.random()<0.002){ S.mail.push({kind:"charity",q:6,day:S.day,src:"rare"}); toast(tr("🎊 神秘慈善赠礼！")); }
  if(S.mail.length>99) S.mail=S.mail.slice(-99);
  if(window.giftBadge) giftBadge();
}
const CHECKIN=[null,{kind:"cash",q:2},{kind:"car",q:2},{kind:"mystery"},{kind:"diamond",q:3},{kind:"house",q:3},{kind:"chips",q:3},{kind:"super"}];
function claimCheckin(){ if(!S)return; if(S.lastCheckin>=S.day){ toast(tr("今日已签到")); return; }
  const day=(S.checkStreak%7)+1; S.lastCheckin=S.day; S.checkStreak++;
  const g=CHECKIN[day], gains=[];
  if(g.kind==="mystery"){ const gg=genGift(); gains.push(GBY[gg.kind].ico+grantGift(gg)); }
  else if(g.kind==="super"){ [{kind:"cash",q:5},{kind:"collectible",q:4},{kind:"chips",q:4}].forEach(p=>gains.push(GBY[p.kind].ico+grantGift({kind:p.kind,q:p.q}))); }
  else gains.push(GBY[g.kind].ico+grantGift(g));
  toast("🎉 "+tr("第%天").replace("%",day)+" +"+gains.join(" ")); refreshGift();
}
function claimAll(){ if(!S||!S.mail.length){ toast(tr("没有新礼物")); return; } const n=S.mail.length; S.mail.forEach(grantGift); S.mail=[]; toast("🎁 +"+n+" "+tr("件礼物")); refreshGift(); }
function giftBadge(){ const b=byId("giftBadge"); if(!b||!S)return; const c=(S.mail?S.mail.length:0)+((S.lastCheckin<S.day)?1:0); if(c>0){b.textContent=c>99?"99+":c; b.classList.add("show");} else b.classList.remove("show"); }
/*-------- UI --------*/
function openGifts(){ if(!S){toast(LANG==="en"?"Start a game first":"请先开始游戏");return;} giftView="checkin"; byId("giftScreen").classList.remove("hidden"); renderGifts(); }
function giftGo(v){ giftView=v; renderGifts(); }
function refreshGift(){ markDirty(); giftBadge(); if(!byId("giftScreen").classList.contains("hidden")) renderGifts(); }
function giftApplyLang(){ if(!byId("giftScreen").classList.contains("hidden")) renderGifts(); }
function qtag(q){ return `<span class="qtag" style="background:${q.col}22;color:${q.col}">${q.ico} ${tr(q.zh)}</span>`; }
function renderGifts(){
  let h=`<h2>🎁 <span>${tr("🎁 礼物中心")}</span></h2>
    <div class="casnote">${tr("礼物均为游戏内虚拟奖励，仅供娱乐，不涉及真实金钱。")}</div>
    <div class="ftabs">`;
  [["checkin","📅 "+tr("每日签到")],["mail","📮 "+tr("礼物邮箱")+(S.mail.length?` (${S.mail.length})`:"")],["book","🏆 "+tr("收集册")]].forEach(t=> h+=`<div class="ftab${giftView===t[0]?" on":""}" onclick="giftGo('${t[0]}')">${t[1]}</div>`);
  h+=`</div>`;
  if(giftView==="checkin"){
    const done=S.checkStreak%7, canToday=S.lastCheckin<S.day, todayIdx=done;
    const icos=["","💵","🚗","🎁","💠","🏠","🎰","🎉"];
    h+=`<div class="frow"><div class="fl">${tr("连续签到")}</div><div class="fv">${S.checkStreak} ${tr("天")}</div></div><div class="checkgrid">`;
    for(let d=1;d<=7;d++){ const isDone=d<=done, isToday=(d===todayIdx+1);
      h+=`<div class="cday${isDone?" done":(isToday&&canToday?" today":"")}"><div class="cdn">${tr("第%天").replace("%",d)}</div><div class="cdi">${icos[d]}</div><div class="cdr">${isDone?"✓":(d===7?tr("超级礼包"):"")}</div></div>`; }
    h+=`</div><button class="fbtn ${canToday?"":"dis"}" style="width:100%;padding:11px;font-size:15px" onclick="claimCheckin()">${canToday?"🎉 "+tr("签到领取"):tr("今日已签到")}</button>`;
  }
  else if(giftView==="mail"){
    if(!S.mail.length) h+=`<div class="note" style="padding:14px">${tr("没有新礼物")}</div>`;
    else { h+=`<button class="fbtn gold" style="width:100%;margin-bottom:8px" onclick="claimAll()">📬 ${tr("全部领取")} (${S.mail.length})</button>`;
      S.mail.slice().reverse().slice(0,40).forEach(g=>{ const k=GBY[g.kind]||{ico:"🎁",zh:"礼物",en:"Gift"}, q=GQ[g.q]||GQ[0];
        h+=`<div class="mailrow"><div class="mi">${k.ico}</div><div class="mt"><div class="mn">${LANG==="en"?k.en:k.zh}</div><div class="md">${tr("来自")} ${tr(GSRC[g.src]||"神秘快递")}${g.fest?" · "+(LANG==="en"?g.fest[1]:g.fest[0]):""}</div></div>${qtag(q)}</div>`; }); }
  }
  else if(giftView==="book"){
    const got=Object.keys(S.giftLog).length, total=GKINDS.length, rate=Math.round(got/total*100);
    h+=`<div style="text-align:center;margin:6px 0"><div class="fv" style="font-size:16px">${tr("收集率")} ${rate}%</div><div class="ballab">${tr("已获得")} ${got}/${total} · ${S.giftsGot} ${tr("件礼物")}</div></div><div class="bookgrid">`;
    GKINDS.forEach(k=>{ const c=S.giftLog[k.id]||0; h+=`<div class="bookcell ${c?"got":"miss"}"><div class="bi">${k.ico}</div><div class="bn">${LANG==="en"?k.en:k.zh}</div><div class="bc">${c?"×"+c:"—"}</div></div>`; });
    h+=`</div>`;
  }
  h+=`<button class="btn ghost" style="padding:9px;margin-top:10px" onclick="byId('giftScreen').classList.add('hidden')">${tr("关闭")}</button>`;
  byId("giftSheet").innerHTML=h;
}
</script>

<script>
/*==================== 🎒 仓库 · 二手市场 · 行情新闻 ====================*/
const TRADE_TYPES=["tech","car","plane","ship","house","building","fun","luxury","science","food"];
const COLL_TYPES=["art","col","biz","prop"];
const MERCHANT=[{zh:"新人商人",en:"Rookie",min:0,fee:0.15},{zh:"优秀商人",en:"Skilled",min:1e9,fee:0.12},{zh:"百万商人",en:"Millionaire",min:10e9,fee:0.09},{zh:"商业大亨",en:"Magnate",min:100e9,fee:0.06},{zh:"全球首富商人",en:"Tycoon",min:1e12,fee:0.03}];
const NEWS_POOL=[
  {zh:"🚀 科技突破，科技资产暴涨",t:["tech","science"],d:0.22},
  {zh:"🏠 房价上涨",t:["house","building"],d:0.16},
  {zh:"🖼️ 艺术热潮，藏品升值",t:["art","col","luxury"],d:0.18},
  {zh:"🚗 豪车热，二手车价上扬",t:["car"],d:0.2},
  {zh:"📈 黄金大涨，收藏走强",t:["col","luxury"],d:0.15},
  {zh:"📈 全球经济繁荣，资产普涨",t:TRADE_TYPES,d:0.08},
  {zh:"📉 股市暴跌，避险情绪升温",t:["building","biz","science"],d:-0.16},
  {zh:"🌪️ 自然灾害，多地资产受挫",t:["house","building","car"],d:-0.18},
];
let tradeView="inv", invSort="val";
function tradeReset(){ [...TRADE_TYPES,...COLL_TYPES].forEach(t=>{ S.mkt[t]=0.78+Math.random()*0.18; S.mktPrev[t]=S.mkt[t]; }); }
function tradeDayTick(){ if(!S)return;
  for(const t of [...TRADE_TYPES,...COLL_TYPES]){ S.mktPrev[t]=S.mkt[t]; S.mkt[t]=clampMkt(S.mkt[t]*(1+(Math.random()-0.5)*0.12)); }
  if(Math.random()<0.55){ const nw=pickNews(); nw.t.forEach(t=>{ if(S.mkt[t]!=null) S.mkt[t]=clampMkt(S.mkt[t]+nw.d*(0.5+Math.random())); });
    S.news.unshift({day:S.day, zh:nw.zh}); if(S.news.length>14) S.news.pop(); }
}
function clampMkt(v){ return Math.max(0.45, Math.min(1.5, v)); }
function pickNews(){ return NEWS_POOL[Math.floor(Math.random()*NEWS_POOL.length)]; }
function mktOf(type){ return S.mkt[type]!=null?S.mkt[type]:0.8; }
function itemResale(it){ return Math.round(it.p*mktOf(it.cat.type)*(window.citySellMod?citySellMod(it.cat.type):1)); }
function merchant(){ let m=MERCHANT[0]; for(const x of MERCHANT) if(S.sold>=x.min) m=x; return m; }
function feeRate(){ return merchant().fee*(window.vipFeeMul?vipFeeMul():1); }
/*-------- 卖出 / 食用 --------*/
function sellItem(id,qty){ const it=ALL.find(x=>x.id===id); if(!it)return; const have=S.owned[id]||0; qty=Math.min(have,qty); if(qty<=0)return;
  const gross=itemResale(it)*qty, net=Math.round(gross*(1-feeRate())); S.owned[id]=have-qty; countTypeAdj(it.cat,-qty);
  S.bal+=net; S.sold+=net; toast("💰 "+tr("已卖出")+" "+it.ico+"×"+qty+" +"+shortMoney(net)); checkAch(); refreshTrade(); }
function sellAllType(id){ const it=ALL.find(x=>x.id===id); sellItem(id, S.owned[id]||0); }
function sellColl(idx){ const c=S.collection[idx]; if(!c)return; const net=Math.round(c.price*mktOf(c.cat||"col")*(1-feeRate()));
  S.collection.splice(idx,1); S.bal+=net; S.sold+=net; toast("💰 +"+shortMoney(net)); checkAch(); refreshTrade(); }
const FOOD_SAT={drink:8, fast:22, cuisine:45, dessert:18, grocery:30};   // 各类食物恢复的饥饿值
function eatFood(id){ const have=S.owned[id]||0; if(have<=0)return; const it=ALL.find(x=>x.id===id); if(!it)return; S.owned[id]=have-1; countTypeAdj(it.cat,-1); S.meals++;
  const sat=FOOD_SAT[it.cat.id]||20; S.hunger=Math.min(100,(S.hunger==null?100:S.hunger)+sat);
  toast(it.ico+" "+tr("好吃！")+" "+tr("饱食")+"+"+sat); checkAch(); refreshTrade(); if(window.refreshCareer) refreshCareer(); }
/*-------- UI --------*/
function openTrade(){ if(!S){toast(LANG==="en"?"Start a game first":"请先开始游戏");return;} tradeView="inv"; byId("tradeScreen").classList.remove("hidden"); renderTrade(); }
function tradeGo(v){ tradeView=v; renderTrade(); }
function refreshTrade(){ markDirty(); if(!byId("tradeScreen").classList.contains("hidden")) renderTrade(); }
function tradeApplyLang(){ if(!byId("tradeScreen").classList.contains("hidden")) renderTrade(); }
function ownedList(){ const arr=[]; for(const it of ALL){ const n=S.owned[it.id]||0; if(n>0) arr.push({it,n}); }
  if(invSort==="val") arr.sort((a,b)=>itemResale(b.it)*b.n-itemResale(a.it)*a.n); else arr.sort((a,b)=>b.n-a.n); return arr; }
function renderTrade(){
  let h=`<h2>🎒 <span>${tr("🎒 仓库 · 二手交易")}</span></h2>
    <div class="frow" style="margin-bottom:8px"><div class="fl">💵 ${tr("账户余额")}</div><div class="fv">${money(S.bal)}</div></div>
    <div class="ftabs">`;
  [["inv","🎒 "+tr("我的仓库")],["shop","🛍 "+tr("我的商店")+(S.listings&&S.listings.length?` (${S.listings.length})`:"")],["mkt","📊 "+tr("行情 · 新闻")]].forEach(t=> h+=`<div class="ftab${tradeView===t[0]?" on":""}" onclick="tradeGo('${t[0]}')">${t[1]}</div>`);
  h+=`</div>`;
  if(tradeView==="inv"){
    const list=ownedList();
    const m=merchant();
    h+=`<div class="merit"><div class="ballab">${tr("商人等级")} · ${tr("手续费")} ${Math.round(feeRate()*100)}%</div><div class="mv">${tr(LANG==="en"?m.en:m.zh)} · ${tr("已卖出")} ${shortMoney(S.sold)}</div></div>`;
    if(!list.length && !S.collection.length) h+=`<div class="note" style="padding:14px">${tr("空空如也，先去买点东西吧")}</div>`;
    list.slice(0,80).forEach(o=>{ const it=o.it, food=it.cat.type==="food", val=itemResale(it);
      h+=`<div class="invrow"><div class="ii">${it.ico}</div><div class="it"><div class="inm">${nm(it)} <span class="iq">×${o.n.toLocaleString("en-US")}</span></div><div class="ival">${tr("估价")} ${priceFmt(val)}/${LANG==="en"?"ea":"件"}</div></div>
        <div class="iact">${food?`<button class="fbtn sm gold" onclick="eatFood('${it.id}')">${tr("食用")}</button>`:""}<button class="fbtn sm" onclick="sellAllType('${it.id}')">${tr("出售")}</button><button class="fbtn sm blue" onclick="listItem('${it.id}')">🛍 ${tr("上架")}</button></div></div>`; });
    if(S.collection.length){ h+=`<div class="ballab" style="margin:8px 0 5px">🏛️ ${tr("我的收藏")}</div>`;
      S.collection.slice().reverse().slice(0,40).forEach((c,ri)=>{ const idx=S.collection.length-1-ri; const val=Math.round(c.price*mktOf(c.cat||"col"));
        h+=`<div class="invrow"><div class="ii">${c.ico}</div><div class="it"><div class="inm">${(LANG==="en"?c.name.en:c.name.zh)} <small style="color:${c.rar.col}">${c.rar.ico}</small></div><div class="ival">${tr("估价")} ${shortMoney(val)}</div></div><div class="iact"><button class="fbtn sm" onclick="sellColl(${idx})">${tr("出售")}</button></div></div>`; }); }
  } else if(tradeView==="shop"){ h+=shopHtml(); }
  else {
    h+=`<div class="note" style="text-align:left">${tr("市场行情（每日波动，低买高卖）")}</div>`;
    const labels={tech:"电子",car:"汽车",plane:"飞机",ship:"船舶",house:"住宅",building:"建筑",fun:"娱乐",luxury:"奢侈品",science:"科技",food:"食品",art:"艺术",col:"收藏",biz:"企业",prop:"地产"};
    [...TRADE_TYPES,...COLL_TYPES].forEach(t=>{ const v=mktOf(t), pv=S.mktPrev[t]!=null?S.mktPrev[t]:v, ch=(v-pv)/pv*100;
      h+=`<div class="mktrow"><span class="mkn">${tr(labels[t]||t)}</span><span class="mkp"><span class="${ch>=0?"up":"down"}">${ch>=0?"▲":"▼"} ${Math.abs(ch).toFixed(1)}%</span> · ×${v.toFixed(2)}</span></div>`; });
    h+=`<div class="ballab" style="margin:9px 0 5px">📰 ${tr("今日新闻")}</div>`;
    if(!S.news.length) h+=`<div class="note">—</div>`;
    else S.news.slice(0,10).forEach(n=> h+=`<div class="newsrow">${tr("第%天").replace? tr("第%天").replace("%",n.day):("D"+n.day)} · ${tr(n.zh)}</div>`);
  }
  h+=`<button class="btn ghost" style="padding:9px;margin-top:10px" onclick="byId('tradeScreen').classList.add('hidden')">${tr("关闭")}</button>`;
  byId("tradeSheet").innerHTML=h;
}
</script>

<script>
/*==================== 🛍 玩家商店 + 🚚 快递物流 ====================*/
const SHOP_LEVELS=[
  {zh:"一级小店",en:"Corner Shop",slots:3,fee:0.12,prem:1.0,up:0},
  {zh:"精品店",en:"Boutique",slots:6,fee:0.09,prem:1.08,up:5e9},
  {zh:"大型商场",en:"Mega Mall",slots:12,fee:0.06,prem:1.18,up:50e9},
  {zh:"世界商城",en:"World Emporium",slots:24,fee:0.03,prem:1.3,up:500e9},
];
function shopLv(){ return SHOP_LEVELS[(S.shopLevel||1)-1]||SHOP_LEVELS[0]; }
function listItem(id){ if(!S)return; const it=ALL.find(x=>x.id===id); const have=S.owned[id]||0; if(!it||have<=0)return;
  if(S.listings.length>=shopLv().slots){ toast(tr("槽位已满，请升级店铺")); return; }
  const price=Math.max(1,Math.round(itemResale(it)*shopLv().prem)); S.owned[id]=0; countTypeAdj(it.cat,-have);
  S.listings.push({id, qty:have, price, sold:false, ship:0}); toast("🛍 "+it.ico+"×"+have+" "+tr("上架")); refreshTrade(); }
function delistItem(idx){ const l=S.listings[idx]; if(!l||l.sold)return; const it=ALL.find(x=>x.id===l.id); S.owned[l.id]=(S.owned[l.id]||0)+l.qty; if(it)countTypeAdj(it.cat,l.qty); S.listings.splice(idx,1); refreshTrade(); }
function upgradeShop(){ if(!S)return; if(S.shopLevel>=SHOP_LEVELS.length){ toast(tr("已是最高等级")); return; } const nxt=SHOP_LEVELS[S.shopLevel]; if(nxt.up>S.bal){ toast(tr("现金不足")); return; } S.bal-=nxt.up; S.shopLevel++; refreshTrade(); }
function shopDayTick(){ if(!S)return;
  for(let i=S.listings.length-1;i>=0;i--){ const l=S.listings[i]; const it=ALL.find(x=>x.id===l.id);
    if(!l.sold){ const mkt=it?itemResale(it):l.price; const ratio=mkt>0?l.price/mkt:1; const chance=Math.max(0.12,Math.min(0.85,0.55-(ratio-1)*0.6));
      if(Math.random()<chance){ l.sold=true; l.ship=0; toast("🔔 "+(it?it.ico:"")+" "+tr("找到买家！")); } }
    else { l.ship++; if(l.ship>=3){ const net=Math.round(l.price*l.qty*(1-shopLv().fee*(window.vipFeeMul?vipFeeMul():1))); S.bal+=net; S.shopSold+=net; S.sold+=net; S.listings.splice(i,1); toast("💰 "+tr("货款到账")+" +"+shortMoney(net)); checkAch(); } }
  }
  if(!byId("tradeScreen").classList.contains("hidden")) renderTrade();
}
function shopHtml(){ const lv=shopLv();
  let h=`<div class="note" style="text-align:left">${tr("店铺出售价更高，但需等买家+物流，比二手即时出售更划算。")}</div>
    <div class="merit"><div class="mv">🛍 ${tr(LANG==="en"?lv.en:lv.zh)}</div>
    <div class="ballab" style="margin-top:3px">${tr("槽位")} ${S.listings.length}/${lv.slots} · ${tr("手续费")} ${Math.round(lv.fee*100)}% · ${tr("溢价")} +${Math.round((lv.prem-1)*100)}% · ${tr("店铺成交")} ${shortMoney(S.shopSold)}</div></div>`;
  if(S.shopLevel<SHOP_LEVELS.length){ const nxt=SHOP_LEVELS[S.shopLevel]; h+=`<button class="fbtn gold" style="width:100%;margin-bottom:9px" onclick="upgradeShop()">⬆ ${tr("升级")} → ${tr(LANG==="en"?nxt.en:nxt.zh)} · ${shortMoney(nxt.up)}</button>`; }
  if(!S.listings.length) h+=`<div class="note">${tr("空空如也，先去买点东西吧")}</div><div class="note" style="margin-top:4px">${tr("在「我的仓库」里点 🛍 上架商品")}</div>`;
  else S.listings.forEach((l,i)=>{ const it=ALL.find(x=>x.id===l.id); const stage= !l.sold ? tr("🏷 在售") : ([tr("📦 待发货"),tr("🚚 运输中"),tr("✅ 已送达")][l.ship]||tr("💰 收到货款"));
    const step=l.sold?l.ship+1:0;
    h+=`<div class="listrow"><div class="lh"><span>${it?it.ico:"📦"}</span><span class="lhn">${it?nm(it):"?"} ×${l.qty.toLocaleString("en-US")}</span><span class="lhp">${shortMoney(l.price*l.qty)}</span></div>
      <div class="steps">${[0,1,2].map(s=>`<div class="st${step>s?" on":""}"></div>`).join("")}</div>
      <div class="lstage ${l.sold&&l.ship>=2?"paid":""}">${stage}${!l.sold?` · <span onclick="delistItem(${i})" style="color:var(--red);cursor:pointer">${tr("撤下")}</span>`:""}</div></div>`; });
  return h;
}
</script>

  {id:"cape",zh:"彩虹角",en:"Cape Rainbow",flag:"🌈",cont:"非洲",buyLo:"science",sellHi:"ship",land:350e6,tier:4,wage:0.75},
  {id:"sun",zh:"阳光海岸城",en:"Sunshine Coast",flag:"🏖️",cont:"大洋洲",buyLo:"house",sellHi:"plane",land:1e9,tier:4,wage:1.2},
  {id:"glac",zh:"冰川之心",en:"Glacier Heart",flag:"🧊",cont:"大洋洲",buyLo:"food",sellHi:"ship",land:600e6,tier:4,wage:1.0},
];
const CBY=Object.fromEntries(CITIES.map(c=>[c.id,c]));
const TICKETS=[0,5e6,30e6,150e6,800e6];
function worldReset(){ if(!S.city) S.city=CITIES[10].id; }
function curCity(){ return CBY[S&&S.city]||CITIES[10]; }
function cityBuyMod(it){ if(!S)return 1; return curCity().buyLo===it.cat.type?0.8:1; }
function citySellMod(type){ if(!S)return 1; const c=curCity(); return c.sellHi===type?1.35:(c.buyLo===type?0.9:1); }
function hasJet(){ if(!S)return false; for(const it of ALL){ if(it.cat.type==="plane"&&(S.owned[it.id]||0)>0) return true; } return false; }
function travelCost(c){ return (hasJet()||(window.vipFreeFlights&&vipFreeFlights()))?0:(TICKETS[c.tier]||0); }
function travelTo(id){ const c=CBY[id]; if(!c||id===S.city)return; const cost=travelCost(c); if(cost>S.bal){toast(tr("现金不足"));return;} S.bal-=cost; S.city=id; S.traveled++; toast("✈️ "+tr("已抵达")+" "+c.flag+nm(c)); markDirty(); refreshWorld(); }
function buyLand(plots){ if(!S)return; const c=curCity(); plots=Math.max(1,plots|0); const cost=c.land*plots; if(cost>S.bal){toast(tr("现金不足"));return;} S.bal-=cost; S.land[c.id]=(S.land[c.id]||0)+plots; toast("🏞️ "+c.flag+" +"+plots+" "+tr("块")); refreshWorld(); }
function landIncome(){ if(!S)return 0; let s=0; for(const c of CITIES) s+=(S.land[c.id]||0)*c.land*0.0008; return s; }
function landValue(){ if(!S)return 0; let s=0; for(const c of CITIES) s+=(S.land[c.id]||0)*c.land; return s; }
/*-------- UI --------*/
const TLAB={tech:"电子",car:"汽车",plane:"飞机",ship:"船舶",house:"住宅",building:"建筑",fun:"娱乐",luxury:"奢侈品",science:"科技",food:"食品"};
function perks(c){ return `<span class="perkchip perkbuy">${tr(TLAB[c.buyLo]||c.buyLo)} ${tr("买入优惠")}-20%</span><span class="perkchip perksell">${tr(TLAB[c.sellHi]||c.sellHi)} ${tr("出售溢价")}+35%</span>`; }
function openWorld(){ if(!S){toast(LANG==="en"?"Start a game first":"请先开始游戏");return;} byId("worldScreen").classList.remove("hidden"); renderWorld(); }
function refreshWorld(){ markDirty(); if(!byId("worldScreen").classList.contains("hidden")) renderWorld(); }
function worldApplyLang(){ if(!byId("worldScreen").classList.contains("hidden")) renderWorld(); }
function renderWorld(){ const c=curCity();
  let h=`<h2>🌍 <span>${tr("🌍 世界地图")}</span></h2>
    <div class="note" style="text-align:left">${tr("不同城市经济不同：在便宜的城市买、在高价的城市卖，赚取差价。")}</div>
    <div class="citycur"><div class="cf">${c.flag}</div><div class="cn">📍 ${nm(c)}</div><div class="cperk">${perks(c)}</div>
      <div style="margin-top:7px;font-size:12px">🏞️ ${tr("你的地块")} <b>${S.land[c.id]||0}</b> · ${tr("地价")} ${shortMoney(c.land)}/${tr("块")}</div>
      <div class="betrow" style="margin-top:6px"><button class="fbtn sm gold" onclick="buyLand(1)">${tr("买地")} +1</button><button class="fbtn sm gold" onclick="buyLand(10)">+10</button></div></div>
    <div class="frow" style="margin-bottom:8px"><div class="fl">${tr("土地日收益")}<small>${hasJet()?"✈️ "+tr("私人飞机免机票"):""}</small></div><div class="fv up">+${shortMoney(landIncome())}</div></div>`;
  const conts=[]; CITIES.forEach(x=>{ if(!conts.includes(x.cont)) conts.push(x.cont); });
  conts.forEach(ct=>{ h+=`<div class="contlab">${tr(ct)}</div><div class="citygrid">`;
    CITIES.filter(x=>x.cont===ct).forEach(city=>{ const here=city.id===S.city, cost=travelCost(city);
      h+=`<div class="citycard${here?" here":""}" ${here?"":`onclick="travelTo('${city.id}')"`}>
        <div class="ccf">${city.flag} <span class="ccn">${nm(city)}</span></div><div class="cct">${perks(city)}</div>
        <div class="cci">${here?("📍 "+tr("当前")):("✈️ "+tr("机票")+" "+(cost?shortMoney(cost):"Free"))}${(S.land[city.id]||0)?` · 🏞️${S.land[city.id]}`:""}</div></div>`; });
    h+=`</div>`; });
  h+=`<button class="btn ghost" style="padding:9px;margin-top:10px" onclick="byId('worldScreen').classList.add('hidden')">${tr("关闭")}</button>`;
  byId("worldSheet").innerHTML=h;
}
</script>

<script>
/*==================== 🏆 福布斯全球富豪榜 ====================*/
const RN1=["星链","钻石","钢铁","石油","黄金","量子","云端","硅谷","天河","北极","太阳","深海","陨石","彩虹","雷霆","苍穹","翡翠","白金","水晶","巨龙","凤凰","麒麟","银河","超新星","远洋"];
const EN1=["Starlink","Diamond","Steel","Oil","Gold","Quantum","Cloud","Silicon","Skyriver","Arctic","Solar","Abyss","Meteor","Rainbow","Thunder","Azure","Emerald","Platinum","Crystal","Dragon","Phoenix","Qilin","Galaxy","Nova","Ocean"];
const RN2=["大亨","女王","巨头","帝王","教父","霸主","传奇","男爵","大王","家族","主席","公爵","巨鳄","财神","掌门","大佬","实业家","投资人","首富","巨擘"];
const EN2=["Magnate","Queen","Tycoon","Emperor","Godfather","Overlord","Legend","Baron","King","Dynasty","Chairman","Duke","Whale","Croesus","Master","Boss","Industrialist","Investor","Mogul","Titan"];
const RICO=["🤖","💎","🏭","🛢️","👑","🚀","🏦","📱","🏙️","🎬","⚡","💰","🛰️","🏗️","💼","🧬","🍾","🛥️","✈️","🏆"];
let RIVALS=[], forbesCat="net";
const FORBES_CATS=[
  {id:"net",zh:"财富总榜",en:"Wealth",val:()=>netWorth()},
  {id:"spent",zh:"消费排行",en:"Spending",val:()=>S.spent},
  {id:"coll",zh:"收藏排行",en:"Collection",val:()=>scoreColl()},
  {id:"estate",zh:"地产排行",en:"Real Estate",val:()=>scoreEstate()},
  {id:"comp",zh:"公司排行",en:"Companies",val:()=>scoreComp()},
  {id:"auc",zh:"拍卖排行",en:"Auctions",val:()=>S.aucSpent||0},
  {id:"charity",zh:"慈善排行",en:"Charity",val:()=>S.donated||0},
];
function forbesReset(){ RIVALS=[]; const used=new Set();
  for(let k=0;k<300;k++){ let i,j,key,g=0; do{ i=Math.floor(Math.random()*RN1.length); j=Math.floor(Math.random()*RN2.length); key=i+"_"+j; }while(used.has(key)&&g++<120); used.add(key);
    const net=Math.round(2e12*Math.pow(0.976,k)*(0.85+Math.random()*0.3));
    RIVALS.push({ zh:RN1[i]+RN2[j], en:EN1[i]+" "+EN2[j], ico:apick(RICO), net,
      f:{spent:0.1+Math.random()*0.4, coll:0.02+Math.random()*0.18, estate:0.1+Math.random()*0.35, comp:0.05+Math.random()*0.28, auc:0.01+Math.random()*0.15, charity:0.004+Math.random()*0.1} }); }
}
function forbesDayTick(){ for(const r of RIVALS) r.net=Math.max(1e9, r.net*(1+(Math.random()-0.47)*0.04)); }
/*-------- ⚔️ 富豪对赌：押上现金和富豪比点数，赢者通吃 --------*/
let duelOpp="top";
function duel(frac){ if(!S||S.over) return;
  const stake = frac==="all" ? S.bal : Math.floor(S.bal*frac);
  if(stake<=0){ toast(tr("现金不足以对赌")); return; }
  const opp = duelOpp==="top" ? RIVALS.reduce((a,b)=>b.net>a.net?b:a, RIVALS[0]) : RIVALS[Math.floor(Math.random()*RIVALS.length)];
  const isTop = opp.net>=forbesTop1();
  let you,foe; do{ you=1+Math.floor(Math.random()*100); foe=1+Math.floor(Math.random()*100); }while(you===foe); // 平局重摇 => 精确 50/50
  const win = you>foe;
  if(win){ S.bal+=stake; S.duelW++; S.duelBest=Math.max(S.duelBest,stake); opp.net=Math.max(1e9,opp.net-stake);
    if(isTop) S.beatTop=true;
    casSound&&casSound("bigwin");
    S.duelMsg={win:true, you, foe, opp:(LANG==="en"?opp.en:opp.zh), ico:opp.ico, amt:stake, top:isTop};
    toast("🎲 "+tr("你赢了！赢得")+shortMoney(stake));
    if(isTop) toast(tr("🎰 你击败了世界首富！"));
  } else { S.bal-=stake; S.duelL++; casSound&&casSound("lose");
    S.duelMsg={win:false, you, foe, opp:(LANG==="en"?opp.en:opp.zh), ico:opp.ico, amt:stake, top:isTop};
    toast("🎲 "+tr("你输了…损失")+shortMoney(stake));
  }
  markDirty(); checkAch(); if(window.checkWins) checkWins(); refreshForbes();
}
function setDuelOpp(o){ duelOpp=o; renderForbes(); }
function forbesTop1(){ if(!RIVALS.length)return Infinity; let m=0; for(const r of RIVALS) if(r.net>m)m=r.net; return m; }
function scoreColl(){ let s=0; if(S.collection) for(const c of S.collection) s+=c.price; for(const it of ALL) if(it.cat.type==="luxury") s+=it.p*(S.owned[it.id]||0); return s; }
function scoreEstate(){ let s=0; for(const it of ALL){ const t=it.cat.type; if(t==="house"||t==="building") s+=it.p*(S.owned[it.id]||0); } if(window.landValue) s+=landValue(); return s; }
function scoreComp(){ let s=0; for(const it of ALL) if(it.cat.type==="science") s+=it.p*(S.owned[it.id]||0); if(S.collection) for(const c of S.collection) if(c.cat==="biz") s+=c.price; return s; }
function rivalVal(r,cat){ return cat==="net"?r.net:r.net*r.f[cat]; }
function pRank(cat){ const pv=FORBES_CATS.find(c=>c.id===cat).val(); let cnt=0; for(const r of RIVALS) if(rivalVal(r,cat)>pv) cnt++; return cnt+1; }
/* 全球 80 亿人财富分布：把净资产映射到全球排名（越有钱名次越靠前）。
   锚点贴近现实（约 5600 万百万富翁、约 2600 位亿万富翁），从零开始时你排在 80 亿名附近，赚钱后名次飞速上升。 */
const POP=8e9;
const RANK_ANCHORS=[[0,POP],[100,7.6e9],[1e3,7e9],[1e4,4e9],[1e5,5e8],[1e6,5.6e7],[1e7,3e6],[1e8,1.5e5],[1e9,2600],[1e12,30],[2.5e12,1]];
function globalRank(w){ if(!(w>0)) return POP; const A=RANK_ANCHORS;
  if(w>=A[A.length-1][0]) return 1;
  for(let i=0;i<A.length-1;i++){ const w0=A[i][0],r0=A[i][1],w1=A[i+1][0],r1=A[i+1][1];
    if(w>=w0 && w<=w1){ const lw0=Math.log(Math.max(1,w0)),lw1=Math.log(w1),lw=Math.log(Math.max(1,w));
      const t=Math.max(0,Math.min(1,(lw-lw0)/(lw1-lw0)));
      return Math.max(1,Math.min(POP,Math.round(Math.exp(Math.log(r0)+(Math.log(r1)-Math.log(r0))*t)))); } }
  return 1; }
/*-------- 慈善 --------*/
function donate(amt){ if(!S)return; amt=Math.round(amt); if(amt<=0)return; if(amt>S.bal){toast(tr("现金不足"));return;} S.bal-=amt; S.donated+=amt; toast("❤️ "+tr("捐赠")+" "+shortMoney(amt)); markDirty(); checkAch(); refreshForbes(); }
function donateCustom(){ donate(parseAmt(byId("donIn").value)); }
/*-------- UI --------*/
function openForbes(){ if(!S){toast(LANG==="en"?"Start a game first":"请先开始游戏");return;} byId("forbesScreen").classList.remove("hidden"); renderForbes(); }
function forbesGo(c){ forbesCat=c; renderForbes(); }
function refreshForbes(){ markDirty(); if(!byId("forbesScreen").classList.contains("hidden")) renderForbes(); }
function forbesApplyLang(){ if(!byId("forbesScreen").classList.contains("hidden")) renderForbes(); }
function renderForbes(){ const cat=forbesCat, cObj=FORBES_CATS.find(c=>c.id===cat);
  const pv=cObj.val(), rank=pRank(cat), total=RIVALS.length+1;
  let h=`<h2>🏆 <span>${tr("🏆 福布斯全球富豪榜")}</span></h2><div class="ftabs">`;
  FORBES_CATS.forEach(c=> h+=`<div class="ftab${cat===c.id?" on":""}" onclick="forbesGo('${c.id}')">${tr(c.zh)}</div>`);
  h+=`</div>
    ${(()=>{ const isNet=cat==="net"; const gRank=isNet?globalRank(pv):0;
      return `<div class="myrank"><div class="rk">#${isNet?gRank.toLocaleString("en-US"):rank}</div>
      <div class="rl">${isNet?("🌍 "+tr("全球排名")+" · "+tr("共")+" "+tr("80亿人")):(tr("全球排名")+" · "+tr("共")+" "+total+" "+(LANG==="en"?"":tr("名富豪")))}</div>
      <div class="rv">${isNet?("🏆 "+tr("富豪榜")+" #"+rank+" · "):""}${tr("你的数值")}：${shortMoney(pv)}</div></div>`; })()}`;
  if(cat==="net"){
    const m=S.duelMsg;
    h+=`<div class="duel"><div class="dh">⚔️ ${tr("⚔️ 富豪对赌")}</div><div class="ds">${tr("和富豪比点数，赢者通吃你押上的筹码。50/50 纯赌运，敢押上全部身家吗？")}</div>`;
    if(m){ h+=`<div class="dvs"><div class="dside"><div class="droll" style="color:${m.win?'var(--green)':'var(--ink)'}">${m.you}</div><div class="dname">${tr("你")}</div></div>
      <div class="dvsx">VS</div><div class="dside"><div class="droll" style="color:${m.win?'var(--ink)':'var(--red)'}">${m.foe}</div><div class="dname">${m.ico}${m.opp}</div></div></div>
      <div class="dres ${m.win?'win':'lose'}">${m.win?("🎉 +"+shortMoney(m.amt)+(m.top?" · 👑":"")):("💥 −"+shortMoney(m.amt))}</div>`; }
    h+=`<div class="fgrid2" style="margin:7px 0"><button class="fbtn sm${duelOpp==='top'?' gold':''}" onclick="setDuelOpp('top')">👑 ${tr("挑战榜首")}</button><button class="fbtn sm${duelOpp==='rand'?' gold':''}" onclick="setDuelOpp('rand')">🎲 ${tr("随机富豪")}</button></div>
      <div class="ballab">${tr("押注")} · 💵 ${shortMoney(S.bal)}</div>
      <div class="fgrid4" style="margin:5px 0"><button class="fbtn sm" onclick="duel(0.1)">${tr("一成")}</button><button class="fbtn sm" onclick="duel(0.5)">${tr("半数")}</button><button class="fbtn red sm" style="grid-column:span 2" onclick="duel('all')">🔥 ${tr("全部身家")}</button></div>
      <div class="frow" style="margin-top:4px"><div class="fl">${tr("对赌战绩")}</div><div class="fv">${tr("胜")}${S.duelW||0} · ${tr("负")}${S.duelL||0} · ${tr("最大单场")} ${shortMoney(S.duelBest||0)}</div></div>
    </div>`;
  }
  if(cat==="charity"){
    h+=`<div class="note" style="text-align:left">${tr("捐赠可提升慈善排名与社会声望。")}</div>
      <div class="frow"><div class="fl">❤️ ${tr("累计捐赠")}</div><div class="fv">${shortMoney(S.donated||0)}</div></div>
      <div class="betrow"><input class="fin" style="margin:0;flex:1" id="donIn" inputmode="decimal" placeholder="1b"><button class="fbtn red" onclick="donateCustom()">${tr("捐赠")}</button></div>
      <div class="fgrid2" style="margin-bottom:8px"><button class="fbtn sm red" onclick="donate(1e8)">+$100M</button><button class="fbtn sm red" onclick="donate(1e9)">+$1B</button></div>`;
  }
  // ranked list
  const rows=RIVALS.map(r=>({ico:r.ico,name:LANG==="en"?r.en:r.zh,val:rivalVal(r,cat),me:false}));
  rows.push({ico:"🧑‍💼",name:tr("你"),val:pv,me:true});
  rows.sort((a,b)=>b.val-a.val);
  const meIdx=rows.findIndex(r=>r.me);
  const show=[]; for(let i=0;i<Math.min(30,rows.length);i++) show.push(i);
  if(meIdx>29){ show.push(-1); [meIdx-1,meIdx,meIdx+1].forEach(i=>{ if(i>=0&&i<rows.length&&!show.includes(i)) show.push(i); }); }
  show.forEach(i=>{ if(i===-1){ h+=`<div style="text-align:center;color:var(--muted);font-size:12px;margin:2px 0">···</div>`; return; }
    const r=rows[i], rk=i+1, medal=rk<=3?["top1","top2","top3"][rk-1]:"";
    h+=`<div class="frank${r.me?" me":""}"><div class="fr ${medal}">${rk<=3?["🥇","🥈","🥉"][rk-1]:rk}</div><div class="fi">${r.ico}</div><div class="fn">${r.name}</div><div class="fnv">${shortMoney(r.val)}</div></div>`; });
  if(cat==="net" && rank===1) h+=`<div class="note" style="color:var(--gold);margin-top:6px">🥇 ${tr("恭喜登顶！")}</div>`;
  h+=`<button class="btn ghost" style="padding:9px;margin-top:10px" onclick="byId('forbesScreen').classList.add('hidden')">${tr("关闭")}</button>`;
  byId("forbesSheet").innerHTML=h;
}
</script>

<script>
/*==================== 🌟 财富帝国 + 🦖 收藏馆评分 + 💾 存档 ====================*/
const DIVS=[
  {id:"bank",zh:"银行集团",en:"Banking Group",ico:"🏦",cost:60e9,inc:0.0009},
  {id:"corp",zh:"跨国企业",en:"Multinational",ico:"🏢",cost:80e9,inc:0.001},
  {id:"hotel",zh:"酒店集团",en:"Hotel Group",ico:"🏨",cost:50e9,inc:0.0011},
  {id:"mall",zh:"连锁商场",en:"Mall Chain",ico:"🏬",cost:45e9,inc:0.001},
  {id:"rail",zh:"铁路网络",en:"Railway Network",ico:"🚄",cost:90e9,inc:0.0008},
  {id:"air",zh:"航空公司",en:"Airline",ico:"✈️",cost:70e9,inc:0.0009},
  {id:"shipco",zh:"海运公司",en:"Shipping Line",ico:"🚢",cost:65e9,inc:0.0009},
  {id:"energy",zh:"能源集团",en:"Energy Group",ico:"⚡",cost:110e9,inc:0.0012},
  {id:"tel",zh:"通信公司",en:"Telecom",ico:"📡",cost:85e9,inc:0.001},
  {id:"museum",zh:"博物馆联盟",en:"Museum Alliance",ico:"🏛️",cost:40e9,inc:0.0007},
  {id:"ent",zh:"娱乐集团",en:"Entertainment Group",ico:"🎢",cost:55e9,inc:0.001},
  {id:"city",zh:"自建城市",en:"Your Own City",ico:"🏙️",cost:250e9,inc:0.0015},
];
const DIV_MAX=5;
function divLv(id){ return (S&&S.emp&&S.emp[id])||0; }
function divCost(d){ const lv=divLv(d.id); return lv===0?d.cost:Math.round(d.cost*lv*1.6); }
function buyDiv(id){ const d=DIVS.find(x=>x.id===id); if(!d)return; const lv=divLv(id); if(lv>=DIV_MAX){return;}
  const c=divCost(d); if(c>S.bal){ toast(tr("现金不足")); return; }
  S.bal-=c; S.emp[id]=lv+1; toast(d.ico+" "+tr(d.zh)+" Lv"+S.emp[id]); markDirty(); checkAch(); refreshEmp(); }
function empIncome(){ if(!S||!S.emp)return 0; let s=0; for(const d of DIVS){ const lv=divLv(d.id); if(lv>0) s+=d.cost*d.inc*lv; } return s; }
function empValue(){ if(!S||!S.emp)return 0; let s=0; for(const d of DIVS){ const lv=divLv(d.id); if(lv>0) s+=d.cost*lv*0.6; } return s; }
function empLevels(){ let s=0; for(const d of DIVS) s+=divLv(d.id); return s; }
function empDone(){ return empLevels()>=DIVS.length*DIV_MAX; }
/*-------- 🦖 收藏馆评分 --------*/
const RAR_W={"礼物":0.5,"普通":1,"优秀":2,"稀有":4,"史诗":8,"传说":16,"神话":32,"唯一":60};
function museumScore(){ if(!S||!S.collection)return 0; let s=0;
  for(const c of S.collection){ const w=(c.rar&&RAR_W[c.rar.zh])||1; s+=w*(2+Math.log10(Math.max(10,c.price))/2); }
  for(const it of ALL) if(it.cat.type==="luxury"&&(S.owned[it.id]||0)>0) s+=2;
  return Math.round(s); }
function museumGrade(){ const s=museumScore(); return s>=2000?"S":s>=900?"A":s>=350?"B":s>=100?"C":"D"; }
/*-------- 💾 存档 --------*/
function saveGame(){ if(!S||S.over) return; try{ S.elapsed=Math.max(0,nowMs()-S.t0); localStorage.setItem("spendSave", JSON.stringify({v:1,S,RIVALS,MODE,greedyMul})); }catch(e){} }
function hasSave(){ try{ return !!localStorage.getItem("spendSave"); }catch(e){ return false; } }
function clearSave(){ try{ localStorage.removeItem("spendSave"); }catch(e){} }
function loadGame(){
  const prevS=S, prevMode=MODE;
  try{ const d=JSON.parse(localStorage.getItem("spendSave")); if(!d||!d.S) return false;
    // 用一份全新状态兜底，再覆盖存档里的字段：任何旧存档缺失的字段都会自动补上默认值
    S=Object.assign(freshState(), d.S);
    if(d.RIVALS&&d.RIVALS.length) RIVALS=d.RIVALS; else if(!RIVALS.length) forbesReset();
    MODE=d.MODE||"normal"; greedyMul=d.greedyMul||1;
    // 老存档缺少后加入的股票(如石油/能源)会导致价格为 undefined/NaN → 逐只补齐/修复
    if(!S.px) S.px={}; if(!S.pxPrev) S.pxPrev={};
    STOCKS.forEach(x=>{ if(!(S.px[x.id]>0)) S.px[x.id]=x.px; if(!(S.pxPrev[x.id]>0)) S.pxPrev[x.id]=S.px[x.id]; });
    if(!S.pxHist) S.pxHist={}; STOCKS.forEach(x=>{ if(!S.pxHist[x.id]||S.pxHist[x.id].length<2) S.pxHist[x.id]=(window.seedHist?seedHist(S.px[x.id]):[S.px[x.id]]); });
    if(!S.goldHist||S.goldHist.length<2) S.goldHist=(window.seedHist?seedHist(S.goldPx||65):[S.goldPx||65]);
    if(!S.mkt||!Object.keys(S.mkt).length) tradeReset();
    if(!S.city) worldReset();
    S.t0=nowMs()-(S.elapsed||0);   // performance.now() 从0重启：按已累计时长重新对齐，避免纪录错乱
    S.over=false;
    if(dayTimer) clearInterval(dayTimer); dayTimer=setInterval(()=>{ if(S&&!S.over) dayTick(); },7000);
    clearInterval(eventTimer); eventTimer=null; if(MODE==="events"||MODE==="chaos") eventTimer=setInterval(tickEvent,1000);
    LOT=null; bj=null; stopAuto();
    closeOv("startScreen"); buildTabs(); buildOneClick(); buildQty(); renderItems(); renderHud();
    toast("💾 "+tr("继续游戏")); return true;
  }catch(e){
    // 存档损坏：回滚到读档前的状态并清掉坏档，避免关掉开始界面后卡死在崩溃的每日结算里
    S=prevS; MODE=prevMode; if(dayTimer){ clearInterval(dayTimer); dayTimer=null; }
    clearSave(); syncContBtn(); byId("startScreen").classList.remove("hidden");
    toast("⚠️ "+tr("存档损坏，已重置")); return false;
  }
}
function syncContBtn(){ const b=byId("contBtn"); if(b) b.style.display=hasSave()?"block":"none"; }

function openEmpire(){ if(!S){toast(LANG==="en"?"Start a game first":"请先开始游戏");return;} byId("empScreen").classList.remove("hidden"); renderEmp(); }
function refreshEmp(){ markDirty(); if(!byId("empScreen").classList.contains("hidden")) renderEmp(); }
function empApplyLang(){ if(!byId("empScreen").classList.contains("hidden")) renderEmp(); }
function renderEmp(){ const lv=empLevels(), max=DIVS.length*DIV_MAX, pct=Math.round(lv/max*100);
  let h=`<h2>🌟 <span>${tr("🌟 财富帝国")}</span></h2>
    <div class="empbar"><div class="eb">${tr("帝国进度")} ${lv}/${max} · ${pct}%</div><div class="ep"><i style="width:${pct}%"></i></div>
      <div class="ballab" style="margin-top:6px">${tr("部门日收益")} <b style="color:var(--green)">+${shortMoney(empIncome())}</b></div>
      ${empDone()?`<div style="color:var(--gold);font-weight:900;margin-top:6px">${tr("🏆 财富帝国达成！")}</div>`:`<div class="ballab" style="margin-top:4px">${tr("收购全部12大部门并升至满级")}</div>`}</div>
    <div class="museum"><div class="mg" style="color:${{S:"#c04cff",A:"#e8912a",B:"#3a8fe0",C:"#4caf50",D:"#9fb0a4"}[museumGrade()]}">${museumGrade()}</div>
      <div class="ms">${tr("🦖 收藏馆评分")} · ${tr("评分")} ${museumScore()} · ${tr("藏品")} ${S.collection.length}</div>
      <div class="ms" style="opacity:.7">${tr("收藏越多越稀有，评分越高")}</div></div>`;
  DIVS.forEach(d=>{ const l=divLv(d.id), c=divCost(d), maxed=l>=DIV_MAX;
    h+=`<div class="divrow${l>0?" owned":""}"><div class="di">${d.ico}</div>
      <div class="dt"><div class="dn">${tr(d.zh)} ${l>0?`<span class="dlv">Lv${l}/${DIV_MAX}</span>`:""}</div>
      <div class="dd">${l>0?`+${shortMoney(d.cost*d.inc*l)}/${LANG==="en"?"d":"天"}`:`+${shortMoney(d.cost*d.inc)}/${LANG==="en"?"d":"天"} @Lv1`}</div></div>
      ${maxed?`<span class="fv">MAX</span>`:`<button class="fbtn sm ${l>0?"gold":""}" onclick="buyDiv('${d.id}')">${l>0?tr("扩张"):tr("收购")}<br>${shortMoney(c)}</button>`}</div>`; });
  h+=`<button class="btn ghost" style="padding:9px;margin-top:8px" onclick="byId('empScreen').classList.add('hidden')">${tr("关闭")}</button>`;
  byId("empSheet").innerHTML=h;
}
/*==================== 🏁 多结局：更多获胜条件 ====================*/
const WINS=[
  {id:"zero", ico:"💸", zh:"财富清零", en:"Spent It All", d:"把现金/存款/股票/贷款全部归零", notMode:"zero",
    chk:()=>S.bal<=0 && S.deposit<=0 && (S.chips||0)<=0 && termsTotal()<=0 && stockValue()<=0 && shortLiab()<=0 && loansTotal()<=0},
  {id:"empire", ico:"🌟", zh:"财富帝国", en:"Wealth Empire", d:"12大商业部门全部升至满级",
    chk:()=>empDone()},
  {id:"forbes", ico:"🥇", zh:"世界首富", en:"World's Richest", d:"从零白手起家登顶福布斯财富榜", mode:"zero",
    chk:()=>RIVALS.length>0 && netWorth()>=forbesTop1()},
  {id:"museum", ico:"🦖", zh:"收藏之王", en:"Master Curator", d:"收藏馆评分达到 S 级",
    chk:()=>museumGrade()==="S"},
  {id:"saint", ico:"❤️", zh:"慈善圣人", en:"Saint of Charity", d:"累计捐赠满 $100B",
    chk:()=>(S.donated||0)>=100e9},
  {id:"landlord", ico:"🌍", zh:"环球地主", en:"Global Landlord", d:"在全部18座城市都拥有土地",
    chk:()=>CITIES.every(c=>(S.land[c.id]||0)>0)},
  {id:"collector", ico:"🏆", zh:"万物收藏家", en:"Own Everything", d:"每一种商品都至少拥有1件",
    chk:()=>ALL.every(it=>(S.owned[it.id]||0)>0)},
];
function gotEndings(){ try{ return JSON.parse(localStorage.getItem("spendEndings")||"[]"); }catch(e){ return []; } }
function saveEnding(id){ try{ const a=gotEndings(); if(a.indexOf(id)<0){ a.push(id); localStorage.setItem("spendEndings",JSON.stringify(a)); } }catch(e){} }
window.WINS=WINS;
function checkWins(){ if(!S||S.over) return; for(const w of WINS){
    if(w.mode && MODE!==w.mode) continue;        // 该结局仅限指定模式（如「世界首富」仅从零开始）
    if(w.notMode && MODE===w.notMode) continue;  // 该模式下禁用此结局（如从零开始禁用「财富清零」）
    let ok=false; try{ ok=!!w.chk(); }catch(e){} if(ok){ endRun(w.id); return; } } }
syncContBtn();
</script>

function sigIncome(){ if(!S||!S.sig)return 0; let s=0; for(const x of SIG) s+=(S.sig[x.id]||0)*x.inc; return s; }

function jobSalary(){ if(!S||!S.job)return 0; if((S.hunger==null?100:S.hunger)<=0) return 0; const j=JBY[S.job]; return j?Math.round(j.pay*cityWage()):0; }
function empCount(){ if(!S||!S.emps)return 0; let n=0; for(const e of EMPS) n+=S.emps[e.id]||0; return n; }
function empSkill(){ if(!S||!S.emps)return 0; let n=0; for(const e of EMPS) n+=(S.emps[e.id]||0)*e.skill; return n; }
function empRevenue(){ if(!S||!S.emps)return 0; let s=0; for(const e of EMPS) s+=(S.emps[e.id]||0)*e.out; return s; }
function empWages(){ if(!S||!S.emps)return 0; let s=0; for(const e of EMPS) s+=(S.emps[e.id]||0)*e.wage; return s; }
function empNet(){ return empRevenue()-empWages(); }
function careerIncome(){ return jobSalary()+empNet(); }
function careerDayTick(){ if(!S)return;
  if(S.job){                                                  // 只有上班才会饿
    const sal=jobSalary();
    S.jobEarned=(S.jobEarned||0)+sal;                         // 记账与当天已发工资一致（此刻尚未扣饥饿）
    if(sal>0) S.exp=(S.exp||0)+EXP_RATE;                      // 上班(没饿晕)才长经验：在差工作攒经验解锁好工作
    const before=(S.hunger==null?100:S.hunger);
    S.hunger=Math.max(0, before-HUNGER_RATE);
    if(before>0 && S.hunger<=0) toast(tr("😵 太饿了！没法好好工作，工资停发，快去吃东西"));
  }
  refreshCareer(); }
function hungerColor(h){ return h>50?"var(--green)":(h>=20?"var(--gold)":"var(--red)"); }
function eatAny(){ if(!S)return; let best=null, bestSat=-1;   // 吃掉库存里回复最多的一份食物
  for(const it of ALL){ if(it.cat.type==="food" && (S.owned[it.id]||0)>0){ const s=FOOD_SAT[it.cat.id]||20; if(s>bestSat){ bestSat=s; best=it; } } }
  if(!best){ toast(tr("🍽️ 没有食物了，先去超市或快餐买点吃的")); return; }
  eatFood(best.id); }
function takeJob(id){ if(!S||!JBY[id])return; const j=JBY[id];
  if((S.exp||0) < (j.req||0)){ toast(tr("经验不足！先在差工作攒够经验")+" ("+Math.floor(S.exp||0)+"/"+j.req+")"); return; }
  S.job=id; toast(tr("💼 已上班")+" "+j.ico+" "+nm(j)); markDirty(); refreshCareer(); }
function quitJob(){ if(!S)return; S.job=""; markDirty(); refreshCareer(); }
function hireEmp(id,n){ if(!S||!EBY[id])return; if(!S.emps)S.emps={}; const cost=EBY[id].wage*n; if(S.bal<cost){ toast(tr("余额不足")); return; } S.bal-=cost; S.emps[id]=(S.emps[id]||0)+n; toast("🧑‍💼 +"+n+" "+EBY[id].ico+" "+nm(EBY[id])); markDirty(); if(window.checkWins)checkWins(); refreshCareer(); }
function fireEmp(id,n){ if(!S||!S.emps)return; S.emps[id]=Math.max(0,(S.emps[id]||0)-n); markDirty(); refreshCareer(); }
function setCareerView(v){ window.careerView=v; renderCareer(); }
function openCareer(){ if(!S){toast(LANG==="en"?"Start a game first":"请先开始游戏");return;} byId("careerScreen").classList.remove("hidden"); renderCareer(); }
function refreshCareer(){ markDirty(); if(byId("careerScreen") && !byId("careerScreen").classList.contains("hidden")) renderCareer(); }
function careerApplyLang(){ if(byId("careerScreen") && !byId("careerScreen").classList.contains("hidden")) renderCareer(); }
function renderCareer(){
  const view=window.careerView||"job", cw=cityWage(), cy=(window.curCity?curCity():null);
  let h=`<h2>💼 <span>${tr("💼 事业")}</span></h2>
    <div class="tabs" style="padding:0 0 8px">
      <button class="tab${view==="job"?" on":""}" onclick="setCareerView('job')">🧑‍🔧 ${tr("打工")}</button>
      <button class="tab${view==="company"?" on":""}" onclick="setCareerView('company')">🏢 ${tr("我的公司")}</button>
    </div>`;
  if(view==="job"){
    h+=`<div class="casnote">${tr("不同城市工资不同——高消费城市薪水更高。")} ${cy?("<b>"+cy.flag+" "+(LANG==="en"?cy.en:cy.zh)+" · "+tr("当前城市薪资系数")+" "+cw.toFixed(2)+"</b>"):""}</div>`;
    const cur=S.job?JBY[S.job]:null;
    h+=`<div class="frow"><div class="fl">${tr("当前工作")}<small>${tr("累计工资")} ${shortMoney(S.jobEarned||0)}</small></div>
      <div class="fv">${cur?(cur.ico+" "+nm(cur)+" · +"+shortMoney(jobSalary())+"/"+(LANG==="en"?"d":"天")):tr("无业")}</div></div>`;
    if(cur) h+=`<button class="fbtn red sm" style="margin:-2px 0 8px auto;display:block" onclick="quitJob()">${tr("辞职")}</button>`;
    const hg=(S.hunger==null?100:S.hunger);
    h+=`<div class="frow" style="display:block">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
        <div class="fl">🍔 ${tr("饥饿值")} <small>${cur?tr("上班会消耗，饿了就吃"):tr("没上班不会饿")}</small></div>
        <div class="fv" style="color:${hungerColor(hg)}">${Math.round(hg)}/100</div></div>
      <div style="height:9px;background:#0c1a13;border-radius:6px;overflow:hidden"><div style="height:100%;width:${hg}%;background:${hungerColor(hg)};transition:width .3s"></div></div>
      <button class="fbtn sm" style="margin-top:7px;width:100%" onclick="eatAny()">🍽️ ${tr("吃东西")}</button>
      ${hg<=0?`<div class="note" style="color:var(--red);margin-top:5px">${tr("太饿了！工资停发，快吃东西恢复")}</div>`:""}</div>`;
    const xp=Math.floor(S.exp||0);
    h+=`<div class="frow"><div class="fl">🎓 ${tr("工作经验")} <small>${tr("每天上班积累，解锁更好的工作")}</small></div><div class="fv">${xp} ${LANG==="en"?"XP":"点"}</div></div>`;
    JOBS.forEach(j=>{ const on=S.job===j.id, req=j.req||0, locked=xp<req;
      const badge=j.tag==="good"?`<span style="color:#7CFF9B">👍 ${tr("好工作")}</span>`:j.tag==="bad"?`<span style="color:#ff8f8f">👎 ${tr("差工作")}</span>`:"";
      const reqTxt=req>0?` · <span style="color:${locked?'#ff8f8f':'#7CFF9B'}">🎓 ${LANG==="en"?req+" XP":"需"+req+"经验"}</span>`:"";
      h+=`<div class="divrow${on?" owned":""}" style="${locked?'opacity:.6':''}"><div class="di">${j.ico}</div><div class="dt"><div class="dn">${nm(j)} ${badge}</div>
        <div class="dd">${tr("日薪")} ${shortMoney(Math.round(j.pay*cw))} <small style="opacity:.6">(×${cw.toFixed(2)})</small>${reqTxt}</div></div>
        ${on?`<span class="dlv">✔ ${LANG==="en"?"working":"在职"}</span>`:locked?`<span class="dlv" style="color:var(--muted)">🔒 ${req}</span>`:`<button class="fbtn sm" onclick="takeJob('${j.id}')">${tr("上班")}</button>`}</div>`; });
  } else {
    const net=empNet();
    h+=`<div class="casnote">${tr("工资越高，招到的人才越强、公司产出越高。低薪员工入不敷出。")}</div>
      <div class="frow"><div class="fl">${tr("员工总数")}<small>${tr("总技能")} ⭐${empSkill()}</small></div><div class="fv">${empCount()}</div></div>
      <div class="frow"><div class="fl">${tr("日营收")} / ${tr("日薪支出")}</div><div class="fv" style="color:var(--green)">+${shortMoney(empRevenue())} <span style="color:var(--red)">-${shortMoney(empWages())}</span></div></div>
      <div class="frow"><div class="fl">${tr("公司日净利")}</div><div class="fv" style="color:${net>=0?"var(--green)":"var(--red)"}">${net>=0?"+":""}${shortMoney(net)}/${LANG==="en"?"d":"天"}</div></div>`;
    EMPS.forEach(e=>{ const cnt=(S.emps&&S.emps[e.id])||0, mgn=e.out-e.wage;
      h+=`<div class="divrow${cnt>0?" owned":""}"><div class="di">${e.ico}</div><div class="dt">
        <div class="dn">${nm(e)} ${"⭐".repeat(e.skill)}${cnt>0?` <span class="dlv">×${cnt}</span>`:""}</div>
        <div class="dd">${tr("日薪")} ${shortMoney(e.wage)} · ${tr("产出")} ${shortMoney(e.out)} · <span style="color:${mgn>=0?"#7CFF9B":"#ff8f8f"}">${mgn>=0?"+":""}${shortMoney(mgn)}/${LANG==="en"?"d":"天"}</span></div></div>
        <div style="display:flex;flex-direction:column;gap:3px">
          <div style="display:flex;gap:3px"><button class="fbtn sm" onclick="hireEmp('${e.id}',1)">+1</button><button class="fbtn sm" onclick="hireEmp('${e.id}',10)">+10</button></div>
          ${cnt>0?`<button class="fbtn red sm" onclick="fireEmp('${e.id}',1)">${tr("解雇")} -1</button>`:""}</div></div>`; });
    h+=`<div class="note">${tr("雇佣需先支付一天工资作为签约金；之后每天自动结算营收与工资。")}</div>`;
  }
  h+=`<button class="btn ghost" style="padding:9px;margin-top:8px;width:100%" onclick="byId('careerScreen').classList.add('hidden')">${tr("关闭")}</button>`;
  byId("careerSheet").innerHTML=h;
}
</script>
</body>
</html>
